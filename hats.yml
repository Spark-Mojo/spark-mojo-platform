cli:
  backend: "claude"
event_loop:
  starting_event: "session.start"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 200
  max_runtime_seconds: 28800
core:
  guardrails:
    - "Governance repo absolute path: /Users/jamesilsley/GitHub/sparkmojo-internal/"
    - "Platform repo absolute path: /Users/jamesilsley/GitHub/spark-mojo-platform/"
    - "NEVER modify CLAUDE.md - it is permanent and sacred"
    - "NEVER modify Desktop.jsx routing structure"
    - "NEVER create .ts or .tsx files - frontend is JSX only"
    - "NEVER hardcode hex colors - use var(--sm-*) tokens"
    - "NEVER run bench get-app or bench install-app without explicit story instruction"
    - "NEVER call Frappe directly from React - always via abstraction layer"
    - "NEVER add clinical routes to billing.py - clinical.py is a separate file"
    - "Routing: modules on poc-dev.app.sparkmojo.com, webhooks on api.poc.sparkmojo.com"
    - "When ambiguous on architecture: write BLOCKED-[STORY-ID].md and move to next story"
    - "Documentation stories: read actual committed code before writing any artifact"
    - "Documentation verbosity: fifth-grader readable, 100x detail is the target"
    - "DEFICIENCIES.md must be brutally honest with specific file and function references"
    - "Research stories: use web search, be verbose, cite sources"
hats:
  health_check:
    name: "Health Check"
    description: "Verifies baseline health before any build work. Halts if broken."
    triggers: ["session.start"]
    publishes: ["health.ok", "health.blocked"]
    max_activations: 1
    instructions: |
      Run baseline checks in order. If any fail, write HEALTH-BLOCKED.md with
      exact error and emit health.blocked. Do not proceed if health is broken.
      1. Check abstraction layer tests pass:
         cd /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer
         pytest tests/ -v 2>&1 | tail -5
         PASS: exits 0, no failures
      2. Check frontend lints clean:
         cd /Users/jamesilsley/GitHub/spark-mojo-platform/frontend
         pnpm run lint 2>&1 | tail -5
         PASS: exits 0, 0 errors
      3. Check governance repo is accessible:
         ls /Users/jamesilsley/GitHub/sparkmojo-internal/platform/PROCESS.md
         PASS: file exists
      If all pass: ralph emit "health.ok" "baseline healthy: tests pass, lint clean, governance accessible"
  story_planner:
    name: "Story Planner"
    description: "Reads next story from PROMPT.md, determines type, writes build plan."
    triggers: ["health.ok", "story.committed"]
    publishes: ["plan.ready", "queue.complete"]
    instructions: |
      Read /Users/jamesilsley/GitHub/spark-mojo-platform/PROMPT.md.
      Find the first story without a [STORY-ID]-COMPLETE marker at repo root.
      If all stories have COMPLETE markers: print LOOP_COMPLETE and emit queue.complete.
      Read the story spec at the absolute path shown in PROMPT.md.
      Determine story type: CODE, DOCUMENTATION, or RESEARCH.
      Write PLAN-[STORY-ID].md at repo root with:
      - Story ID and type
      - Files to create or modify (with absolute paths)
      - Quality gates to run for this story type
      - Dependencies to check before starting
      - Any ambiguities that need resolution
      If ambiguous on architecture: write BLOCKED-[STORY-ID].md. Emit plan.ready anyway
      so the builder can handle the blocked state.
      ralph emit "plan.ready" "[STORY-ID]: type=[type], [N] files, gates=[gate summary]"
  builder:
    name: "Builder"
    description: "Executes the plan. Code stories build and run fast gates. Doc stories read code and write artifacts. Research stories conduct research and write findings."
    triggers: ["plan.ready", "build.retry"]
    publishes: ["build.ready", "build.blocked"]
    instructions: |
      Read PLAN-[STORY-ID].md at repo root.
      If BLOCKED file exists for this story: write BLOCKED-[STORY-ID].md with
      full context and emit build.blocked.
      For CODE stories:
        git checkout -b [branch name from PROMPT.md]
        Implement exactly what the story spec says. Nothing more. Nothing less.
        Run fast gate after each significant change:
          pytest tests/[relevant_test_file].py -v
        When fast gates pass: ralph emit "build.ready" "[STORY-ID]: code complete, fast gates pass"
      For DOCUMENTATION stories:
        Read every file listed in the PROMPT.md "Read before writing" section.
        Read the actual committed code - not just the story spec.
        Create the output directory if it does not exist.
        Write each required artifact file with extreme verbosity.
        Fifth-grader readable. 100x the detail you think you need.
        DEFICIENCIES.md must be brutally honest with specific code references.
        Commit each file to sparkmojo-internal main as you complete it.
        When all files written and committed: ralph emit "build.ready" "[STORY-ID]: [N] files written and committed"
      For RESEARCH stories:
        Read every file listed in the PROMPT.md "Read before writing" section.
        Use web search extensively. Research the questions in the story spec.
        Write verbose, specific, opinionated research documents.
        Cite sources. Be honest about uncertainty.
        Commit both research files to sparkmojo-internal main.
        When complete: ralph emit "build.ready" "[STORY-ID]: research complete, [N] documents committed"
  verifier:
    name: "Verifier"
    description: "Runs full gate suite appropriate to story type. Only hat that creates COMPLETE markers."
    triggers: ["build.ready"]
    publishes: ["task.done", "build.retry"]
    instructions: |
      Read PLAN-[STORY-ID].md to determine story type and gates.
      For CODE stories - run ALL of these:
        1. cd /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer
           pytest tests/ -v
           PASS: 0 failures
           FAIL: emit build.retry with exact failure, file, line number
        2. pytest tests/ --cov=. --cov-report=term-missing --cov-fail-under=70
           PASS: exits 0
           FAIL: emit build.retry with coverage report
        3. Check endpoint reachable per story spec verification steps.
           Use correct host per routing reference in PROMPT.md.
           PASS: app response (not Traefik 404)
           FAIL: emit build.retry with exact curl output
      For DOCUMENTATION stories - verify ALL of these:
        1. All required files exist at output path
           ls [output_path]/*.md | wc -l
           PASS: count matches required file count from story spec
           FAIL: emit build.retry listing missing files
        2. Each file meets minimum length
           wc -w [output_path]/*.md
           PASS: each file >= minimum words from story spec
           FAIL: emit build.retry listing short files
        3. Story-specific checks per story spec acceptance criteria
           (FAQ question counts, specific content requirements, etc.)
      For RESEARCH stories - verify ALL of these:
        1. Both research files exist at output paths
        2. Business requirements doc >= 2000 words
        3. Technical research doc >= 1500 words and contains a recommendation section
        4. wc -w on each file
      If ALL gates pass:
        touch [STORY-ID]-COMPLETE
        ralph emit "task.done" "[STORY-ID]: all gates pass - [summary of results]"
      If ANY gate fails:
        ralph emit "build.retry" "[STORY-ID]: [exact failure details]"
  committer:
    name: "Committer"
    description: "Commits code story work. Documentation and research stories are already committed by builder."
    triggers: ["task.done"]
    publishes: ["story.committed"]
    instructions: |
      Read PLAN-[STORY-ID].md to determine story type.
      For CODE stories:
        cd /Users/jamesilsley/GitHub/spark-mojo-platform
        git add -A
        Read exact commit message from story spec file in sparkmojo-internal.
        git commit -m "[exact message from story spec]"
        ralph emit "story.committed" "[STORY-ID] committed on [branch]"
      For DOCUMENTATION and RESEARCH stories:
        Files are already committed to sparkmojo-internal by the builder.
        No additional commit needed in spark-mojo-platform.
        ralph emit "story.committed" "[STORY-ID] documentation committed to sparkmojo-internal"
