cli:
  backend: "claude"

event_loop:
  starting_event: "session.start"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 150
  max_runtime_seconds: 28800

core:
  guardrails:
    - "Governance repo absolute path: /Users/jamesilsley/GitHub/sparkmojo-internal/"
    - "Platform repo absolute path: /Users/jamesilsley/GitHub/spark-mojo-platform/"
    - "Story specs absolute path: /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/"
    - "NEVER use TypeScript - all frontend files are .jsx"
    - "NEVER hardcode hex colors - use var(--sm-*) tokens"
    - "NEVER install pip packages or bench apps on VPS during a build run"
    - "NEVER modify CLAUDE.md, hats.yml, or PROMPT.md during a build run"
    - "If any architectural decision is ambiguous: write BLOCKED-[STORY-ID].md and move to next story"
    - "All stories in this run are Frappe DocType or Python stories - no frontend work"
    - "VPS backend container name: frappe-poc-backend-1"
    - "VPS DB container name: frappe-poc-db-1"
    - "Frappe site name: poc-dev.sparkmojo.com"
    - "MariaDB database name: _af67db3b56527a72"
    - ".env.poc canonical path on VPS: /home/ops/spark-mojo-platform/.env.poc"
hats:
  health_check:
    name: "Health Check"
    description: "Verifies baseline Frappe and Python health before any build work. Halts session if baseline is broken."
    triggers: ["session.start"]
    publishes: ["health.ok", "health.blocked"]
    max_activations: 1
    instructions: |
      Run these checks in order. If any fail, write HEALTH-BLOCKED.md at repo root explaining which check failed and why, then emit health.blocked.
      1. Verify Python imports work:
         cd /Users/jamesilsley/GitHub/spark-mojo-platform
         python -c "import frappe" 2>&1
         PASS: no ImportError (frappe not installed locally is acceptable - note it)
      2. Verify patches.txt is parseable (no syntax errors):
         cat frappe-apps/sm_billing/sm_billing/patches.txt
         PASS: file readable, no binary content
      3. Verify sm_claim.json is valid JSON:
         python -c "import json; json.load(open('frappe-apps/sm_billing/sm_billing/sm_billing/doctype/sm_claim/sm_claim.json'))"
         PASS: exits 0
      4. Verify story spec files exist:
         ls /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/BILL-006-canonical-state-expansion.md
         ls /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/BILL-007-sm-claim-new-fields.md
         ls /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/BILL-008-sm-claim-indexes.md
         ls /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/BILL-009-state-log-doctype.md
         ls /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/BILL-010-state-machine-controller.md
         PASS: all 5 files exist      5. Verify VPS SSH is reachable:
         ssh -o ConnectTimeout=10 sparkmojo "echo ok"
         PASS: prints "ok"
      If all 5 checks pass:
      ralph emit "health.ok" "JSON valid, story specs present, VPS reachable"

  story_planner:
    name: "Story Planner"
    description: "Reads PROMPT.md, finds next incomplete story, confirms dependencies are met, writes build plan."
    triggers: ["health.ok", "story.committed"]
    publishes: ["plan.ready", "queue.complete"]
    instructions: |
      Read /Users/jamesilsley/GitHub/spark-mojo-platform/PROMPT.md.
      Find the first story in the queue that does NOT have a COMPLETE marker file at repo root (e.g., BILL-006-COMPLETE).
      If all stories have COMPLETE markers:
        Write RUN-SUMMARY-SESSION-28.md at repo root summarizing all results.
        Print LOOP_COMPLETE
        ralph emit "queue.complete" "all stories complete"
        Stop.
      For the identified story:
      1. Read the full story spec from the absolute path in PROMPT.md
      2. Check dependencies: if the story spec lists Depends on, verify those COMPLETE marker files exist
         If a dependency is not complete, write BLOCKED-[STORY-ID].md explaining the missing dependency, then emit plan.ready with BLOCKED flag
      3. Write PLAN-[STORY-ID].md at repo root with:
         - Story ID and branch name
         - List of files to create or modify with absolute paths
         - Story type (DocType JSON change / patch file / Python controller)
         - Dependency check result
         - Quality gate type (DocType gates or Python gates - see PROMPT.md Definition of Done)
      ralph emit "plan.ready" "[STORY-ID]: [N] files, type: [type], deps: ok"
  builder:
    name: "Builder"
    description: "Implements the story plan exactly as specified. Runs fast gate after each file. Never improvises on architecture."
    triggers: ["plan.ready", "build.retry"]
    publishes: ["build.ready", "build.blocked"]
    instructions: |
      Read PLAN-[STORY-ID].md at repo root to identify the current story.
      If PLAN file contains BLOCKED: write BLOCKED-[STORY-ID].md and ralph emit "build.blocked" "[STORY-ID]: blocked - [reason]". Stop.
      git checkout -b story/[branch-name-from-plan]
      Build exactly what the story spec says. Read the spec at the absolute path in PLAN file.
      Nothing more. Nothing less. No extra fields, no extra methods, no extra files.
      After each file is created or modified, run the fast gate:
      - For DocType JSON changes:
        python -c "import json; json.load(open('[absolute path to modified json]'))"
        PASS: exits 0 (valid JSON)
      - For Python patch files:
        python -c "import ast; ast.parse(open('[absolute path]').read())"
        PASS: exits 0 (valid Python syntax)
      - For sm_claim.py (BILL-010):
        python -m pytest frappe-apps/sm_billing/sm_billing/sm_billing/doctype/sm_claim/test_sm_claim.py -v 2>&1 | tail -5
        PASS: all tests pass
      If fast gate fails: fix immediately before proceeding to next file.
      When all files are created and fast gates pass:
      ralph emit "build.ready" "[STORY-ID]: all files created, fast gates pass"
  verifier:
    name: "Verifier"
    description: "Runs full gate suite against the story spec acceptance criteria. Only hat that can mark a story done."
    triggers: ["build.ready"]
    publishes: ["task.done", "build.retry"]
    instructions: |
      Read PLAN-[STORY-ID].md to identify current story and gate type.
      For BILL-006, BILL-007, BILL-008, BILL-009 (DocType gates):
      SSH to VPS and run:
        ssh sparkmojo "docker exec frappe-poc-backend-1 bash -c 'cd /home/frappe/frappe-bench && git pull origin main && bench --site poc-dev.sparkmojo.com migrate'"
        PASS: exits 0, no errors in output
        Then run story-specific verification commands from the "Test Steps (VPS Verification)" section of the story spec.
        Each step has an Expected output - compare actual to expected.
        Run patch idempotency check (run-patch twice, verify no error on second run).
      For BILL-010 (Python controller gates):
        1. Run unit tests locally:
           cd /Users/jamesilsley/GitHub/spark-mojo-platform
           python -m pytest frappe-apps/sm_billing/sm_billing/sm_billing/doctype/sm_claim/test_sm_claim.py -v
           PASS: 12 tests, 0 failures
        2. Only if tests pass - SSH to VPS:
           ssh sparkmojo "docker exec frappe-poc-backend-1 bash -c 'cd /home/frappe/frappe-bench && git pull origin main && bench --site poc-dev.sparkmojo.com migrate'"
           PASS: exits 0
        3. Run bench console verification from story spec Test Steps 6-8.
      If ALL gates pass:
        touch [STORY-ID]-COMPLETE
        ralph emit "task.done" "[STORY-ID]: all gates pass - [summary of gate results]"
      If ANY gate fails:
        ralph emit "build.retry" "[STORY-ID]: gate failed - [exact command, exact error, line number if applicable]"
  committer:
    name: "Committer"
    description: "Commits verified work using the exact commit message from the story spec. Then pushes branch to GitHub origin."
    triggers: ["task.done"]
    publishes: ["story.committed"]
    instructions: |
      Read PLAN-[STORY-ID].md to identify current story and branch name.
      Read the story spec to get the exact commit message from the "Commit Message" section.
      git add -A
      git commit -m "[exact commit message from story spec - copy verbatim]"
      git push origin story/[branch-name]
      Verify the push succeeded (exit 0).
      ralph emit "story.committed" "[STORY-ID] committed and pushed on story/[branch-name]"