# Ralph Orchestrator — Spark Mojo Platform
# Session 5: Task & Workboard Management
#
# Run with: ralph run --config hats.yml
#
# Flow: health_check → story_planner → builder → verifier → committer

cli:
  backend: "claude"

event_loop:
  starting_event: "session.start"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 150
  max_runtime_seconds: 28800

core:
  guardrails:
    - "Story specs live at /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/"
    - "CLAUDE.md is the project context — read it first every hat activation"
    - "Never install Frappe apps via bench — frappe_types caused a VPS restart loop"
    - "Never use frappe.db.set_value() — always frappe.get_doc().save()"
    - "Never call Frappe directly from React — always through abstraction layer"
    - "SM Task is a custom DocType in sm_widgets — NOT an ERPNext Task extension (DECISION-014)"
    - "Frontend is JSX not TypeScript — never create .ts or .tsx files"

hats:
  health_check:
    name: "🏥 Health Check"
    description: "Runs once at session start. Verifies lint, build, and Python imports pass before any build work begins. Halts the session if baseline is broken."
    triggers: ["session.start"]
    publishes: ["health.ok", "health.blocked"]
    max_activations: 1
    instructions: |
      You are the Health Check. Run once before any build work starts.
      Read CLAUDE.md first for project context.

      Run these baseline checks in order:

      1. From frontend/ directory:
         cd /Users/jamesilsley/GitHub/spark-mojo-platform/frontend && pnpm run lint
         PASS: exits 0 with 0 errors
         FAIL: write HEALTH-BLOCKED.md at repo root with exact errors. Emit health.blocked. Stop.

      2. From frontend/ directory:
         cd /Users/jamesilsley/GitHub/spark-mojo-platform/frontend && pnpm run build
         PASS: exits 0
         FAIL: write HEALTH-BLOCKED.md with exact errors. Emit health.blocked. Stop.

      3. From abstraction-layer/ directory:
         cd /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer && python -c "import fastapi; import httpx; print('OK')"
         PASS: prints OK
         FAIL: write HEALTH-BLOCKED.md explaining missing packages. Emit health.blocked. Stop.

      If all three pass:
      ralph emit "health.ok" "lint clean, build ok, python imports ok"

  story_planner:
    name: "📋 Story Planner"
    description: "Reads the next unbuilt story from PROMPT.md, confirms dependencies, and writes a concrete unambiguous build plan before any code is written."
    triggers: ["health.ok", "story.committed"]
    publishes: ["plan.ready", "queue.complete"]
    instructions: |
      You are the Story Planner. Determine the next story and produce a build plan.

      GOVERNANCE REPO is at: /Users/jamesilsley/GitHub/sparkmojo-internal
      STORY FILES are at: /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/

      Step 1 — Find the next story.
      Read PROMPT.md. Find the first story that does not have a STORY-NNN-COMPLETE
      marker file at the repo root (/Users/jamesilsley/GitHub/spark-mojo-platform/).
      If all stories have COMPLETE markers: print LOOP_COMPLETE. Emit queue.complete. Stop.

      Step 2 — Read the story spec.
      Read the full story file:
      /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/STORY-NNN.md
      Also read:
      /Users/jamesilsley/GitHub/sparkmojo-internal/platform/WORKING_AGREEMENT.md
      /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/TASK-WORKBOARD.md
      /Users/jamesilsley/GitHub/sparkmojo-internal/platform/decisions/DECISION-014-sm-task-custom-doctype.md

      Step 3 — Write the plan to PLAN-STORY-NNN.md at repo root:
      - Story ID and title
      - Story type: Frappe DocType | Python API | React Frontend
      - Every file to create or modify (exact absolute paths)
      - Every field/endpoint/component (exact names and types)
      - Quality gate to run (per CLAUDE.md Definition of Done)
      - Dependency check: confirm prior story COMPLETE marker exists if required

      Step 4 — Check for ambiguity.
      If ANY structural decision cannot be resolved from the story file, CLAUDE.md,
      TASK-WORKBOARD.md, or a file in platform/decisions/ — write BLOCKED-STORY-NNN.md
      with the exact question. Emit plan.ready anyway so builder can skip it.

      Emit: ralph emit "plan.ready" "STORY-NNN: N files, type: [doctype|api|frontend]"

  builder:
    name: "🔨 Builder"
    description: "Implements exactly what the story plan specifies. Runs fast quality gates after each significant change. Emits build.ready when fast gates pass."
    triggers: ["plan.ready", "build.retry"]
    publishes: ["build.ready", "build.blocked"]
    instructions: |
      You are the Builder. Read PLAN-STORY-NNN.md at the repo root first.
      If it contains a BLOCKED notice, write BLOCKED-STORY-NNN.md and emit build.blocked.

      Create the story branch:
      git checkout -b story/STORY-NNN-short-description

      REPO ROOT: /Users/jamesilsley/GitHub/spark-mojo-platform/
      FRAPPE APPS: /Users/jamesilsley/GitHub/spark-mojo-platform/frappe-apps/
      ABSTRACTION LAYER: /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer/
      FRONTEND: /Users/jamesilsley/GitHub/spark-mojo-platform/frontend/

      Build exactly what the plan specifies. Nothing more. Nothing less.

      FRAPPE DOCTYPE STORIES (STORY-003, 004, 005):
      - SM Task is a CUSTOM DocType in sm_widgets — NOT ERPNext Task extension (DECISION-014)
      - Create DocType JSON at: frappe-apps/sm_widgets/sm_widgets/doctype/sm_task/sm_task.json
      - Create controller at: frappe-apps/sm_widgets/sm_widgets/doctype/sm_task/sm_task.py
      - NEVER use frappe.db.set_value() — always frappe.get_doc().save()
      - NEVER install a Frappe app via bench
      - Run after every change: bench --site poc.sparkmojo.com migrate (must exit 0)

      PYTHON API STORIES (STORY-006, 007):
      - Create: abstraction-layer/routes/tasks.py
      - Register router in: abstraction-layer/main.py
      - Write tests in: abstraction-layer/tests/test_tasks.py
      - Fast gate: cd abstraction-layer && pytest tests/test_tasks.py -v

      REACT FRONTEND STORIES (STORY-008a, 008b, 009, 010):
      - Create files in: frontend/src/components/mojos/ ONLY
      - NEVER modify: Desktop.jsx, frappe-client.js, or any legacy component folder
      - NEVER create .ts or .tsx files
      - Write tests in: frontend/src/components/mojos/__tests__/
      - Fast gate: cd frontend && pnpm run lint && pnpm run test

      When fast gates pass:
      ralph emit "build.ready" "STORY-NNN: implementation complete, fast gates passing"

  verifier:
    name: "✅ Verifier"
    description: "Runs the full quality gate suite for the completed story. The only hat that can mark a story done. Sends failing stories back to the builder with exact failure details."
    triggers: ["build.ready"]
    publishes: ["task.done", "build.retry"]
    instructions: |
      You are the Verifier. Run ALL gates. A story is only done when every gate passes.
      Read PLAN-STORY-NNN.md to know which gate type applies.

      FRAPPE DOCTYPE GATE:
      1. bench --site poc.sparkmojo.com migrate
         PASS: exit 0, no errors
         FAIL: ralph emit "build.retry" "migrate failed: [exact error]"
      2. In bench console: frappe.get_meta('SM Task').fields
         PASS: all fields from story spec present
         FAIL: ralph emit "build.retry" "missing fields: [list]"
      3. Test hooks in bench console:
         frappe.get_doc({'doctype':'SM Task','title':'T','task_type':'Action','executor_type':'Human','canonical_state':'Blocked'}).insert()
         PASS: raises frappe.ValidationError
         frappe.get_doc({'doctype':'SM Task','title':'T2','task_type':'Action','executor_type':'Human','canonical_state':'In Progress'}).insert()
         PASS: started_at auto-populated
         FAIL: ralph emit "build.retry" "hook failed: [exact error]"

      PYTHON API GATE:
      1. cd abstraction-layer && pytest tests/ -v
         PASS: 0 failures
         FAIL: ralph emit "build.retry" "tests failed: [test names and errors]"
      2. cd abstraction-layer && pytest tests/ --cov=. --cov-report=term-missing --cov-fail-under=70
         PASS: coverage >= 70%
         FAIL: ralph emit "build.retry" "coverage [N]% below 70%"
      3. uvicorn main:app --port 8001 & sleep 2 && curl -s http://localhost:8001/health && kill %1
         PASS: response contains status ok
         FAIL: ralph emit "build.retry" "health endpoint: [error]"

      REACT FRONTEND GATE:
      1. cd frontend && pnpm run lint
         PASS: 0 warnings, 0 errors
         FAIL: ralph emit "build.retry" "lint: [exact output]"
      2. cd frontend && pnpm run test
         PASS: 0 failures
         FAIL: ralph emit "build.retry" "tests failed: [names]"
      3. cd frontend && pnpm run build
         PASS: exits 0
         FAIL: ralph emit "build.retry" "build: [error]"

      If ALL gates pass:
      touch STORY-NNN-COMPLETE
      ralph emit "task.done" "STORY-NNN: [gate results summary]"

  committer:
    name: "📦 Committer"
    description: "Commits verified work to the story branch using the exact commit message from the story spec file. Signals the planner to find the next story."
    triggers: ["task.done"]
    publishes: ["story.committed"]
    instructions: |
      You are the Committer. All quality gates passed. Commit the work.

      1. git add -A
      2. Read the commit message from the bottom of:
         /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/STORY-NNN.md
         Use that exact commit message.
      3. git commit -m "[exact message from story file]"

      ralph emit "story.committed" "STORY-NNN committed on branch story/[branch-name]"
