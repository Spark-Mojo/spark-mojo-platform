cli:
  backend: "claude"

event_loop:
  starting_event: "session.start"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 300
  max_runtime_seconds: 28800

core:
  guardrails:
    - "Governance repo absolute path: /Users/jamesilsley/GitHub/sparkmojo-internal/"
    - "Story files absolute path: /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/"
    - "NEVER install Frappe apps via bench — causes VPS restart loops. SM apps use tabInstalled Application SQL only."
    - "NEVER add sm_billing to apps.txt or Dockerfile.frappe — it is an SM custom app managed by deploy.sh."
    - "NEVER create TypeScript files — all frontend files are .jsx."
    - "NEVER hardcode credentials — all secrets via os.getenv()."
    - "Always deploy to VPS after every story is verified. Use: ssh sparkmojo 'cd /home/ops/spark-mojo-platform && git pull origin main && ./deploy.sh'"
    - "Medplum docker compose MUST use --env-file .env.poc flag."
    - "bench execute does NOT support semicolon-separated multi-statement code — use single expressions only."
    - "If architectural ambiguity arises, write BLOCKED-[STORY].md and continue to next story."
    - "Coverage command always omits frappe_native.py: pytest tests/ --cov=. --cov-report=term-missing --omit=connectors/frappe_native.py --cov-fail-under=70"
    - "BILL-003: Mock Stedi HTTP at the httpx/requests level. Do NOT call real Stedi API. STEDI_SANDBOX=true means use mock responses."
    - "STORY-016: medplum_connector.py already exists at abstraction-layer/connectors/medplum_connector.py — import it, do not recreate it."
    - "VPS abstraction layer tests must use .venv: cd /home/ops/spark-mojo-platform/abstraction-layer && .venv/bin/python3 -m pytest tests/ -v"

hats:
  health_check:
    name: "Health Check"
    description: "Verifies baseline repo health before any build work. Halts if broken."
    triggers: ["session.start"]
    publishes: ["health.ok", "health.blocked"]
    max_activations: 1
    instructions: |
      Read CLAUDE.md at /Users/jamesilsley/GitHub/spark-mojo-platform/CLAUDE.md first.
      Run these checks. If any fail, write HEALTH-BLOCKED.md and emit health.blocked.

      1. Python imports check:
         cd /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer
         python3 -c "import main" 2>&1
         PASS: no ImportError

      2. Existing tests pass:
         pytest tests/ -q 2>&1 | tail -5
         PASS: 0 failures

      3. No BLOCKED-* files from previous runs:
         ls /Users/jamesilsley/GitHub/spark-mojo-platform/BLOCKED-* 2>/dev/null && echo "BLOCKED FILES FOUND" || echo "clean"
         PASS: no files found

      4. medplum_connector import check (STORY-015 dependency):
         cd /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer
         python3 -c "from connectors.medplum_connector import MedplumClient; print('OK')" 2>&1
         PASS: prints OK

      If all pass: ralph emit "health.ok" "all health checks pass"

  dispatcher:
    name: "Dispatcher"
    description: "Fans out after health check to start BILL-003 and STORY-016 parallel tracks."
    triggers: ["health.ok"]
    publishes: ["bill_003.plan_start", "story_016.plan_start"]
    max_activations: 1
    instructions: |
      ralph emit "bill_003.plan_start" "starting BILL-003 track"
      ralph emit "story_016.plan_start" "starting STORY-016 track"

  bill_003_planner:
    name: "BILL-003 Planner"
    description: "Plans the Stedi claim submission endpoint. Reads story spec and writes build plan."
    triggers: ["bill_003.plan_start"]
    publishes: ["bill_003_plan.ready", "bill_003.blocked"]
    max_activations: 1
    instructions: |
      Read the full story spec:
      /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/BILL-003-stedi-claim-submission.md

      Read these reference files:
      /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer/routes/onboarding.py
      /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer/main.py
      /Users/jamesilsley/GitHub/spark-mojo-platform/frappe-apps/sm_billing/sm_billing/sm_billing/doctype/sm_claim/sm_claim.json
      /Users/jamesilsley/GitHub/spark-mojo-platform/frappe-apps/sm_billing/sm_billing/sm_billing/doctype/sm_payer/sm_payer.json

      Read billing architecture reference:
      /Users/jamesilsley/GitHub/sparkmojo-internal/platform/research/billing/BILLING-ARCHITECTURE-DESIGN.md

      Write PLAN-BILL-003.md at repo root with:
      - Files to create: routes/billing.py, tests/test_billing.py
      - Files to modify: main.py (register two routers)
      - List of all endpoints: POST /claims/submit, POST /webhooks/stedi/277, GET /claims/{name}/status
      - Stedi mock response shape for 837P: {"transactionId": "TEST-TXN-001", "status": "accepted", "editStatus": "accepted", "errors": [], "warnings": []}
      - Env vars: STEDI_API_KEY, STEDI_SANDBOX
      - Test strategy: httpx mock or unittest.mock.patch for Stedi HTTP calls
      - Gate type: pytest + coverage

      ralph emit "bill_003_plan.ready" "BILL-003: 3 endpoints planned, mock strategy defined"

  story_016_planner:
    name: "STORY-016 Planner"
    description: "Plans the Medplum stub replacement in the provisioning API. Small story."
    triggers: ["story_016.plan_start"]
    publishes: ["story_016_plan.ready", "story_016.blocked"]
    max_activations: 1
    instructions: |
      Read the full story spec:
      /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/STORY-016-medplum-project-provisioning.md

      Read these files:
      /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer/routes/provisioning.py
      /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer/connectors/medplum_connector.py

      Write PLAN-STORY-016.md at repo root with:
      - Single file to modify: abstraction-layer/routes/provisioning.py (Step 8 only)
      - Import to add: from connectors.medplum_connector import MedplumClient
      - Exact code block to replace (the current stub block)
      - Exact replacement code block (from story spec)
      - Tests to update: any provisioning tests that check for stub- prefix behavior
      - Gate type: pytest + coverage (omit frappe_native.py)

      ralph emit "story_016_plan.ready" "STORY-016: single-file provisioning stub replacement planned"

  bill_003_builder:
    name: "BILL-003 Builder"
    description: "Builds Stedi claim submission endpoint with mocked HTTP calls in tests."
    triggers: ["bill_003_plan.ready"]
    publishes: ["bill_003_build.ready", "bill_003_build.blocked"]
    max_activations: 3
    instructions: |
      Read PLAN-BILL-003.md. If BLOCKED, write BLOCKED-BILL-003.md and emit bill_003_build.blocked.

      cd /Users/jamesilsley/GitHub/spark-mojo-platform
      git checkout main
      git pull origin main
      git checkout -b story/bill-003-stedi-claim-submission

      Create: abstraction-layer/routes/billing.py
      Follow the exact pattern from abstraction-layer/routes/onboarding.py.
      Implement:
        - POST /api/modules/billing/claims/submit
        - GET /api/modules/billing/claims/{claim_name}/status
        - POST /api/webhooks/stedi/277 (separate webhook router)
      All secrets via os.getenv(). No hardcoded values.
      STEDI_SANDBOX=true check must route to mock/test behavior.

      Modify: abstraction-layer/main.py
      Register both routers:
        app.include_router(billing_router, prefix="/api/modules/billing")
        app.include_router(billing_webhook_router, prefix="/api/webhooks/stedi")

      Create: abstraction-layer/tests/test_billing.py
      Use unittest.mock.patch or pytest-mock to mock all Stedi HTTP calls.
      Stedi mock success response: {"transactionId": "TEST-TXN-001", "editStatus": "accepted", "errors": [], "warnings": []}
      Test cases must cover:
        - successful claim submission (mock Stedi returns accepted)
        - claim state updated to submitted after successful POST
        - duplicate submission blocked (already-submitted state check)
        - Stedi rejection response updates state back to draft
        - 277CA webhook handler updates claim state correctly
        - GET /claims/{name}/status returns correct fields
        - GET /claims/nonexistent returns 404
        - STEDI_API_KEY missing returns clear error

      Create or update: abstraction-layer/.env.example
      Add: STEDI_API_KEY= and STEDI_SANDBOX=true

      Fast gate:
      cd /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer
      python3 -c "from routes.billing import router; print('import OK')"
      PASS: prints import OK

      ralph emit "bill_003_build.ready" "BILL-003: billing.py + tests built, import OK"

  story_016_builder:
    name: "STORY-016 Builder"
    description: "Replaces Medplum stub in provisioning.py with real MedplumClient call."
    triggers: ["story_016_plan.ready"]
    publishes: ["story_016_build.ready", "story_016_build.blocked"]
    max_activations: 3
    instructions: |
      Read PLAN-STORY-016.md. If BLOCKED, write BLOCKED-STORY-016.md and emit story_016_build.blocked.

      cd /Users/jamesilsley/GitHub/spark-mojo-platform
      git checkout main
      git pull origin main
      git checkout -b story/story-016-medplum-project-provisioning

      Modify ONLY: abstraction-layer/routes/provisioning.py

      Add import near top of file:
        from connectors.medplum_connector import MedplumClient

      Initialize client at module level (after imports, before route definitions):
        medplum_client = MedplumClient()

      Replace the current Step 8 stub block with the exact replacement from the story spec:
        /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/STORY-016-medplum-project-provisioning.md

      Add the TODO comment for STORY-017 exactly as specified in the story spec.

      Update any existing tests in tests/ that assert stub- prefix behavior:
      - Tests without MEDPLUM_BASE_URL should still pass (stub mode unchanged)
      - Tests with MEDPLUM_BASE_URL set should mock MedplumClient.create_project()

      Fast gate:
      cd /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer
      python3 -c "from routes.provisioning import router; print('import OK')"
      PASS: prints import OK

      ralph emit "story_016_build.ready" "STORY-016: provisioning stub replaced, import OK"

  bill_003_verifier:
    name: "BILL-003 Verifier"
    description: "Runs full pytest suite for billing routes. All tests must pass with 70% coverage."
    triggers: ["bill_003_build.ready"]
    publishes: ["bill_003.done", "bill_003_build.retry"]
    instructions: |
      Run acceptance criteria from:
      /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/BILL-003-stedi-claim-submission.md

      GATE 1: Import check
      cd /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer
      python3 -c "from routes.billing import router, billing_webhook_router; print('OK')"
      PASS: prints OK

      GATE 2: Routers registered in main.py
      grep -c "billing_router\|billing_webhook_router" /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer/main.py
      PASS: count >= 2

      GATE 3: Billing tests pass
      cd /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer
      pytest tests/test_billing.py -v 2>&1
      PASS: 0 failures

      GATE 4: Full suite passes
      pytest tests/ -v 2>&1 | tail -10
      PASS: 0 failures

      GATE 5: Coverage >= 70% (omitting frappe_native.py)
      pytest tests/ --cov=. --cov-report=term-missing --omit=connectors/frappe_native.py --cov-fail-under=70 2>&1 | tail -15
      PASS: exits 0

      GATE 6: Endpoints appear in OpenAPI schema
      python3 -c "
import asyncio
from httpx import AsyncClient, ASGITransport
from main import app
async def check():
    async with AsyncClient(transport=ASGITransport(app=app), base_url='http://test') as c:
        r = await c.get('/docs')
        print('docs:', r.status_code)
asyncio.run(check())
"
      PASS: docs: 200

      GATE 7: No hardcoded API keys
      grep -rn 'STEDI_API_KEY.*=.*[a-zA-Z0-9]\{10\}' /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer/routes/billing.py && echo FAIL || echo PASS
      PASS: prints PASS

      If ALL gates pass:
        touch /Users/jamesilsley/GitHub/spark-mojo-platform/BILL-003-COMPLETE
        ralph emit "bill_003.done" "BILL-003: all gates pass, billing endpoint verified"

      If ANY fail:
        ralph emit "bill_003_build.retry" "BILL-003: [exact gate that failed and error output]"

  story_016_verifier:
    name: "STORY-016 Verifier"
    description: "Runs full pytest suite to confirm Medplum stub replacement works in both stub and real modes."
    triggers: ["story_016_build.ready"]
    publishes: ["story_016.done", "story_016_build.retry"]
    instructions: |
      Run acceptance criteria from:
      /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/STORY-016-medplum-project-provisioning.md

      GATE 1: Import check
      cd /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer
      python3 -c "from routes.provisioning import router; print('OK')"
      PASS: prints OK

      GATE 2: Stub mode works (no MEDPLUM_BASE_URL)
      python3 -c "
import os
os.environ.pop('MEDPLUM_BASE_URL', None)
from routes.provisioning import medplum_client
print('configured:', medplum_client.is_configured)
"
      PASS: prints configured: False

      GATE 3: All tests pass
      pytest tests/ -v 2>&1 | tail -10
      PASS: 0 failures

      GATE 4: Coverage >= 70% (omitting frappe_native.py)
      pytest tests/ --cov=. --cov-report=term-missing --omit=connectors/frappe_native.py --cov-fail-under=70 2>&1 | tail -15
      PASS: exits 0

      If ALL gates pass:
        touch /Users/jamesilsley/GitHub/spark-mojo-platform/STORY-016-COMPLETE
        ralph emit "story_016.done" "STORY-016: stub replaced, all tests pass, coverage OK"

      If ANY fail:
        ralph emit "story_016_build.retry" "STORY-016: [exact gate that failed and error output]"

  bill_003_committer:
    name: "BILL-003 Committer"
    description: "Commits BILL-003 branch, merges to main, deploys full stack to VPS."
    triggers: ["bill_003.done"]
    publishes: ["bill_003.committed"]
    max_activations: 1
    instructions: |
      cd /Users/jamesilsley/GitHub/spark-mojo-platform
      git add -A
      git commit -m "feat: Stedi claim submission endpoint — POST /api/modules/billing/claims/submit + 277CA webhook receiver"
      git push origin story/bill-003-stedi-claim-submission

      git checkout main
      git merge story/bill-003-stedi-claim-submission --no-ff -m "merge: BILL-003 Stedi claim submission endpoint verified"
      git push origin main

      Deploy to VPS:
      ssh sparkmojo 'cd /home/ops/spark-mojo-platform && git pull origin main && ./deploy.sh'
      PASS: deploy.sh exits 0

      ralph emit "bill_003.committed" "BILL-003 merged to main and deployed"

  story_016_committer:
    name: "STORY-016 Committer"
    description: "Commits STORY-016 branch, merges to main, deploys to VPS."
    triggers: ["story_016.done"]
    publishes: ["story_016.committed"]
    max_activations: 1
    instructions: |
      cd /Users/jamesilsley/GitHub/spark-mojo-platform
      git add -A
      git commit -m "feat: replace Medplum stub with real Project creation in provisioning API (STORY-016)"
      git push origin story/story-016-medplum-project-provisioning

      git checkout main
      git merge story/story-016-medplum-project-provisioning --no-ff -m "merge: STORY-016 Medplum real Project creation in provisioning"
      git push origin main

      Deploy to VPS:
      ssh sparkmojo 'cd /home/ops/spark-mojo-platform && git pull origin main && ./deploy.sh'
      PASS: deploy.sh exits 0

      ralph emit "story_016.committed" "STORY-016 merged to main and deployed"

  session_closer:
    name: "Session Closer"
    description: "Writes run summary when both stories are committed and signals completion."
    triggers: ["bill_003.committed", "story_016.committed"]
    publishes: ["session.closed"]
    instructions: |
      Write SESSION-22-OVERNIGHT-COMPLETE.md at repo root with:
      - BILL-003 status: branch, commit hash, endpoints built, test count, coverage
      - STORY-016 status: branch, commit hash, stub replaced, test results
      - Any BLOCKED files or warnings
      - VPS deployment status for both stories
      - Next steps: verify morning test plan, commission BILL-004 + STORY-017

      ralph emit "session.closed" "Session 22 overnight run complete"

  cleanup:
    name: "Cleanup"
    description: "Archives PLAN-*, *-COMPLETE, and run summary files into datestamped archive folder."
    triggers: ["session.closed"]
    publishes: []
    max_activations: 1
    instructions: |
      DATE=$(date +%Y-%m-%d)
      ARCHIVE_DIR=/Users/jamesilsley/GitHub/spark-mojo-platform/docarchive/ralph-runs/$DATE
      mkdir -p $ARCHIVE_DIR

      Move to archive (skip if not found):
      - PLAN-*.md
      - *-COMPLETE (zero-byte marker files)
      - SESSION-*-COMPLETE.md
      - MORNING-TEST-PLAN.md
      - QUEUE-COMPLETE.md

      Do NOT move:
      - BLOCKED-*.md
      - CLAUDE.md
      - PROMPT.md
      - hats.yml

      cd /Users/jamesilsley/GitHub/spark-mojo-platform
      git add -A
      git commit -m "chore: archive Ralph run artifacts to docarchive/ralph-runs/$DATE"
      git push origin main

      Print: LOOP_COMPLETE
