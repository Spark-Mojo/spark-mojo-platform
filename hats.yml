cli:
  backend: "claude"

event_loop:
  starting_event: "session.start"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 300
  max_runtime_seconds: 28800

core:
  guardrails:
    - "Governance repo absolute path: /Users/jamesilsley/GitHub/sparkmojo-internal/"
    - "Story files absolute path: /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/"
    - "NEVER install Frappe apps via bench — causes VPS restart loops. SM apps use tabInstalled Application SQL only."
    - "NEVER add sm_billing to apps.txt or Dockerfile.frappe — it is an SM custom app managed by deploy.sh."
    - "NEVER create TypeScript files — all frontend files are .jsx."
    - "NEVER hardcode credentials — all secrets via os.getenv()."
    - "Always deploy to VPS after every story is verified. Use: ssh sparkmojo 'cd /home/ops/spark-mojo-platform && git pull origin main && ./deploy.sh'"
    - "Medplum docker compose MUST use --env-file .env.poc flag."
    - "bench execute does NOT support semicolon-separated multi-statement code — use single expressions only."
    - "If architectural ambiguity arises, write BLOCKED-[STORY].md and continue to next story."

hats:
  health_check:
    name: "Health Check"
    description: "Verifies baseline repo health before any build work. Halts if broken."
    triggers: ["session.start"]
    publishes: ["health.ok", "health.blocked"]
    max_activations: 1
    instructions: |
      Read CLAUDE.md at /Users/jamesilsley/GitHub/spark-mojo-platform/CLAUDE.md first.
      Run these checks. If any fail, write HEALTH-BLOCKED.md and emit health.blocked.

      1. Python imports check:
         cd /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer
         python3 -c "import main" 2>&1
         PASS: no ImportError

      2. Existing tests pass:
         pytest tests/ -q 2>&1 | tail -5
         PASS: 0 failures

      3. No BLOCKED-* files from previous runs:
         ls /Users/jamesilsley/GitHub/spark-mojo-platform/BLOCKED-* 2>/dev/null && echo "BLOCKED FILES FOUND" || echo "clean"
         PASS: no files found

      4. sm_billing pip installs cleanly:
         pip install -e /Users/jamesilsley/GitHub/spark-mojo-platform/frappe-apps/sm_billing -q 2>&1
         PASS: no error

      If all pass: ralph emit "health.ok" "all health checks pass"

  dispatcher:
    name: "Dispatcher"
    description: "Fans out after health check to start both parallel story tracks."
    triggers: ["health.ok"]
    publishes: ["bill_002.plan_start", "story_015.plan_start"]
    max_activations: 1
    instructions: |
      ralph emit "bill_002.plan_start" "starting BILL-002 track"
      ralph emit "story_015.plan_start" "starting STORY-015 track"

  bill_002_planner:
    name: "BILL-002 Planner"
    description: "Plans creation of all 11 billing DocTypes. Reads story spec and writes build plan."
    triggers: ["bill_002.plan_start"]
    publishes: ["bill_002_plan.ready", "bill_002.blocked"]
    max_activations: 1
    instructions: |
      Read the full story spec:
      /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/BILL-002-core-billing-doctypes.md

      Read the reference DocType for structure:
      /Users/jamesilsley/GitHub/spark-mojo-platform/frappe-apps/sm_provisioning/sm_provisioning/sm_provisioning/doctype/sm_site_registry/

      Read BILLING-ARCHITECTURE-DESIGN.md for full field specs:
      /Users/jamesilsley/GitHub/sparkmojo-internal/platform/research/billing/BILLING-ARCHITECTURE-DESIGN.md

      Write PLAN-BILL-002.md at repo root with:
      - List of all 11 DocTypes to create with directory paths
      - For each: is_child_table, naming rule, key fields
      - Confirmation that module field will be "SM Billing" in all JSON files
      - Gate type: bench migrate on VPS + Frappe Desk verification

      ralph emit "bill_002_plan.ready" "BILL-002: 11 DocTypes planned"

  story_015_planner:
    name: "STORY-015 Planner"
    description: "Plans the Medplum abstraction layer connector. Reads story spec and writes build plan."
    triggers: ["story_015.plan_start"]
    publishes: ["story_015_plan.ready", "story_015.blocked"]
    max_activations: 1
    instructions: |
      Read the full story spec:
      /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/STORY-015-medplum-abstraction-layer-connector.md

      Read the connector design reference:
      /Users/jamesilsley/GitHub/sparkmojo-internal/platform/research/medplum-implementation/MEDPLUM-INFRA-DESIGN.md

      Read existing abstraction layer structure:
      /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer/main.py

      Write PLAN-STORY-015.md at repo root with:
      - Files to create: connectors/__init__.py, connectors/medplum_connector.py, tests/test_medplum_connector.py
      - MedplumClient method list with project_id enforcement requirement
      - 13 test cases to implement
      - Gate type: pytest 13/13 pass, coverage >= 70%

      ralph emit "story_015_plan.ready" "STORY-015: connector + 13 tests planned"

  bill_002_builder:
    name: "BILL-002 Builder"
    description: "Creates all 11 billing DocTypes in sm_billing exactly as planned."
    triggers: ["bill_002_plan.ready"]
    publishes: ["bill_002_build.ready", "bill_002_build.blocked"]
    max_activations: 3
    instructions: |
      Read PLAN-BILL-002.md. If BLOCKED, write BLOCKED-BILL-002.md and emit bill_002_build.blocked.

      git checkout main
      git checkout -b story/bill-002-core-billing-doctypes

      Create all 11 DocType directories under:
      /Users/jamesilsley/GitHub/spark-mojo-platform/frappe-apps/sm_billing/sm_billing/sm_billing/doctype/

      Each DocType needs: __init__.py, sm_{name}.json, sm_{name}.py
      Follow the field specs exactly from BILLING-ARCHITECTURE-DESIGN.md section 2.
      Every JSON must have "module": "SM Billing".
      Child table DocTypes (SM Claim Line, SM ERA Line) must have "istable": 1.

      Fast gate after creating files:
      find /Users/jamesilsley/GitHub/spark-mojo-platform/frappe-apps/sm_billing/sm_billing/sm_billing/doctype -name "*.json" | wc -l
      PASS: 11 JSON files

      ralph emit "bill_002_build.ready" "BILL-002: 11 DocTypes created"

  story_015_builder:
    name: "STORY-015 Builder"
    description: "Creates MedplumClient connector with project_id enforcement and unit tests."
    triggers: ["story_015_plan.ready"]
    publishes: ["story_015_build.ready", "story_015_build.blocked"]
    max_activations: 3
    instructions: |
      Read PLAN-STORY-015.md. If BLOCKED, write BLOCKED-STORY-015.md and emit story_015_build.blocked.

      git checkout main
      git checkout -b story/story-015-medplum-connector

      Create:
      1. /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer/connectors/__init__.py
      2. /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer/connectors/medplum_connector.py
      3. /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer/tests/test_medplum_connector.py

      CRITICAL: Every FHIR data method (get_resource, create_resource, update_resource,
      search_resources) MUST call _validate_project_id() as its FIRST line.
      project_id=None or project_id="" MUST raise MedplumProjectScopeError immediately.
      This is DECISION-028 — non-negotiable HIPAA requirement.

      Fast gate:
      cd /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer
      python3 -c "from connectors.medplum_connector import MedplumClient, MedplumProjectScopeError; print('import OK')"
      PASS: prints import OK

      ralph emit "story_015_build.ready" "STORY-015: connector built, import OK"

  bill_002_verifier:
    name: "BILL-002 Verifier"
    description: "Deploys sm_billing to VPS, runs bench migrate, verifies all 11 DocTypes exist in Frappe Desk."
    triggers: ["bill_002_build.ready"]
    publishes: ["bill_002.done", "bill_002_build.retry"]
    instructions: |
      Run acceptance criteria from:
      /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/BILL-002-core-billing-doctypes.md

      GATE 1: All 11 DocType JSON files exist
      find /Users/jamesilsley/GitHub/spark-mojo-platform/frappe-apps/sm_billing/sm_billing/sm_billing/doctype -name "*.json" | wc -l
      PASS: 11

      GATE 2: All child tables have istable=1
      grep -l '"istable": 1' /Users/jamesilsley/GitHub/spark-mojo-platform/frappe-apps/sm_billing/sm_billing/sm_billing/doctype/sm_claim_line/sm_claim_line.json
      grep -l '"istable": 1' /Users/jamesilsley/GitHub/spark-mojo-platform/frappe-apps/sm_billing/sm_billing/sm_billing/doctype/sm_era_line/sm_era_line.json
      PASS: both files found

      GATE 3: All JSON files have correct module
      grep -rL '"module": "SM Billing"' /Users/jamesilsley/GitHub/spark-mojo-platform/frappe-apps/sm_billing/sm_billing/sm_billing/doctype/
      PASS: empty output (all files have correct module)

      GATE 4: Commit to branch
      cd /Users/jamesilsley/GitHub/spark-mojo-platform
      git add -A
      git commit -m "feat: core billing DocTypes — SM Payer, SM Provider, SM Claim, SM ERA, SM Denial, SM Appeal, SM Eligibility Check, SM Payment, SM Credential"
      git push origin story/bill-002-core-billing-doctypes

      GATE 5: Deploy and migrate on VPS
      ssh sparkmojo 'cd /home/ops/spark-mojo-platform && git fetch origin && git checkout story/bill-002-core-billing-doctypes && git pull origin story/bill-002-core-billing-doctypes && ./deploy.sh --phase 2 && ./deploy.sh --phase 3'
      PASS: deploy.sh phases 2 and 3 exit 0

      GATE 6: Verify DocTypes exist in Frappe
      ssh sparkmojo "docker exec frappe-poc-backend-1 bench --site poc-dev.sparkmojo.com execute \"print(frappe.db.exists('DocType', 'SM Payer'), frappe.db.exists('DocType', 'SM Claim'), frappe.db.exists('DocType', 'SM ERA'), frappe.db.exists('DocType', 'SM Denial'), frappe.db.exists('DocType', 'SM Appeal'))\""
      PASS: all return truthy values

      GATE 7: Create test SM Payer record
      ssh sparkmojo "docker exec frappe-poc-backend-1 bench --site poc-dev.sparkmojo.com execute \"doc = frappe.get_doc({'doctype': 'SM Payer', 'payer_name': 'Test Payer', 'payer_short_name': 'TEST', 'stedi_trading_partner_id': 'TEST001', 'payer_type': 'commercial', 'era_delivery_method': 'webhook', 'timely_filing_days': 90, 'is_active': 1}); doc.insert(ignore_permissions=True); frappe.db.commit(); print('Created:', doc.name)\""
      PASS: prints Created: TEST

      If ALL gates pass:
        touch /Users/jamesilsley/GitHub/spark-mojo-platform/BILL-002-COMPLETE
        ralph emit "bill_002.done" "BILL-002: 11 DocTypes verified on VPS, test record created"

      If ANY fail:
        ralph emit "bill_002_build.retry" "BILL-002: [exact gate that failed and error]"

  story_015_verifier:
    name: "STORY-015 Verifier"
    description: "Runs full pytest suite for Medplum connector. All 13 tests must pass with 70% coverage."
    triggers: ["story_015_build.ready"]
    publishes: ["story_015.done", "story_015_build.retry"]
    instructions: |
      Run acceptance criteria from:
      /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/STORY-015-medplum-abstraction-layer-connector.md

      GATE 1: Import check
      cd /Users/jamesilsley/GitHub/spark-mojo-platform/abstraction-layer
      python3 -c "from connectors.medplum_connector import MedplumClient, MedplumProjectScopeError; print('OK')"
      PASS: prints OK

      GATE 2: All 13 tests pass
      pytest tests/test_medplum_connector.py -v 2>&1
      PASS: 13 passed, 0 failed

      GATE 3: Coverage >= 70%
      pytest tests/test_medplum_connector.py --cov=connectors --cov-report=term-missing 2>&1 | tail -10
      PASS: coverage on medplum_connector.py >= 70%

      GATE 4: project_id=None raises MedplumProjectScopeError (critical HIPAA check)
      python3 -c "
      import asyncio
      from connectors.medplum_connector import MedplumClient, MedplumProjectScopeError
      client = MedplumClient()
      try:
          asyncio.run(client.get_resource('Patient', 'test', project_id=None))
          print('FAIL: should have raised')
      except MedplumProjectScopeError:
          print('PASS: MedplumProjectScopeError raised correctly')
      except Exception as e:
          print('PASS: raised exception (acceptable):', type(e).__name__)
      "
      PASS: prints PASS

      If ALL gates pass:
        touch /Users/jamesilsley/GitHub/spark-mojo-platform/STORY-015-COMPLETE
        ralph emit "story_015.done" "STORY-015: 13/13 tests pass, coverage OK, project_id enforcement verified"

      If ANY fail:
        ralph emit "story_015_build.retry" "STORY-015: [exact gate that failed]"

  bill_002_committer:
    name: "BILL-002 Committer"
    description: "Merges BILL-002 branch to main and deploys full stack to VPS."
    triggers: ["bill_002.done"]
    publishes: ["bill_002.committed"]
    max_activations: 1
    instructions: |
      cd /Users/jamesilsley/GitHub/spark-mojo-platform
      git checkout main
      git merge story/bill-002-core-billing-doctypes --no-ff -m "merge: BILL-002 core billing DocTypes — 11 DocTypes verified on VPS"
      git push origin main

      Deploy full stack to VPS:
      ssh sparkmojo 'cd /home/ops/spark-mojo-platform && git pull origin main && ./deploy.sh'
      PASS: deploy.sh exits 0

      ralph emit "bill_002.committed" "BILL-002 merged to main and deployed"

  story_015_committer:
    name: "STORY-015 Committer"
    description: "Commits STORY-015 branch and pushes to origin."
    triggers: ["story_015.done"]
    publishes: ["story_015.committed"]
    max_activations: 1
    instructions: |
      cd /Users/jamesilsley/GitHub/spark-mojo-platform
      git add -A
      git commit -m "feat: Medplum abstraction layer connector — MedplumClient with project_id enforcement + unit tests"
      git push origin story/story-015-medplum-connector
      ralph emit "story_015.committed" "STORY-015 committed on story/story-015-medplum-connector"

  session_closer:
    name: "Session Closer"
    description: "Writes run summary and emits session.closed when both stories are committed."
    triggers: ["bill_002.committed", "story_015.committed"]
    publishes: ["session.closed"]
    instructions: |
      Write SESSION-21-OVERNIGHT-COMPLETE.md at repo root with:
      - BILL-002 status: branch, commit, VPS verification result
      - STORY-015 status: branch, test results, coverage
      - Any warnings or BLOCKED files
      - Next steps: merge STORY-015 branch, commission BILL-003 + STORY-016

      ralph emit "session.closed" "Session 21 overnight run complete"

  cleanup:
    name: "Cleanup"
    description: "Archives all PLAN-*, *-COMPLETE, and run summary files. Keeps repo root clean."
    triggers: ["session.closed"]
    publishes: []
    max_activations: 1
    instructions: |
      DATE=$(date +%Y-%m-%d)
      ARCHIVE_DIR=/Users/jamesilsley/GitHub/spark-mojo-platform/docarchive/ralph-runs/$DATE
      mkdir -p $ARCHIVE_DIR

      Move to archive (skip if not found):
      - PLAN-*.md
      - *-COMPLETE (zero-byte marker files)
      - SESSION-*-COMPLETE.md
      - MORNING-TEST-PLAN.md
      - QUEUE-COMPLETE.md

      Do NOT move:
      - BLOCKED-*.md
      - CLAUDE.md
      - PROMPT.md
      - hats.yml

      cd /Users/jamesilsley/GitHub/spark-mojo-platform
      git add -A
      git commit -m "chore: archive Ralph run artifacts to docarchive/ralph-runs/$DATE"
      git push origin main

      Print: LOOP_COMPLETE
