cli:
  backend: "claude"

event_loop:
  starting_event: "session.start"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 80
  max_runtime_seconds: 21600

core:
  guardrails:
    - "Read CLAUDE.md at /Users/jamesilsley/GitHub/spark-mojo-platform/CLAUDE.md before any work."
    - "This is a RESEARCH run, not a build run. Do NOT write any React code."
    - "Do NOT create abstraction layer endpoints."
    - "Do NOT modify any existing Mojo files."
    - "Do NOT touch Willow (willow.sparkmojo.com) or SM Internal (internal.sparkmojo.com) sites."
    - "The ONLY output is: sparkmojo-internal/platform/architecture/ERPNEXT_APP_EVALUATION.md"
    - "Source credentials before starting: SM_POCDEV_SITE_PASSWORD must be set."
    - "Governance repo (local): /Users/jamesilsley/GitHub/sparkmojo-internal/"
    - "Evaluation site: poc-dev.sparkmojo.com (container: frappe-poc-backend-1)"
    - "Use absolute paths everywhere. Relative paths fail."
    - "If a module is broken or inaccessible: write BLOCKED-MEGA-NNN.md and move to next story."

hats:
  health_check:
    name: "Health Check"
    description: "Verifies credentials set, POC site accessible, governance repo writable before evaluation starts."
    triggers: ["session.start"]
    publishes: ["health.ok", "health.blocked"]
    max_activations: 1
    instructions: |
      Run these checks. If any fail, write HEALTH-BLOCKED.md and emit health.blocked.

      1. Required env var is set:
         echo "SM_POCDEV_SITE_PASSWORD: ${SM_POCDEV_SITE_PASSWORD:+SET}"
         PASS: prints "SM_POCDEV_SITE_PASSWORD: SET"
         FAIL: write BLOCKED-CREDENTIALS.md, emit health.blocked, stop.

      2. POC site is reachable:
         curl -sI https://poc-dev.sparkmojo.com --max-time 10 | head -1
         PASS: HTTP/2 200 or 302

      3. Frappe login works:
         curl -s -c /tmp/frappe-eval-cookies.txt -X POST \
           https://poc-dev.sparkmojo.com/api/method/login \
           -d "usr=Administrator&pwd=${SM_POCDEV_SITE_PASSWORD}" | python3 -c \
           "import sys,json; d=json.load(sys.stdin); print(d.get('message','FAIL'))"
         PASS: prints "Logged In"
         FAIL: wrong password or site not ready

      4. Governance repo is writable:
         test -d /Users/jamesilsley/GitHub/sparkmojo-internal/platform/architecture && echo OK
         PASS: OK

      5. ERPNEXT_APP_EVALUATION.md exists or create it:
         EVAL_DOC=/Users/jamesilsley/GitHub/sparkmojo-internal/platform/architecture/ERPNEXT_APP_EVALUATION.md
         If file does not exist, create it with the header from PROMPT.md.
         Commit to sparkmojo-internal with message: "docs: ERPNEXT_APP_EVALUATION.md — evaluation run started"

      If all pass:
        ralph emit "health.ok" "credentials set, poc-dev reachable, login works, governance repo ready"

  story_planner:
    name: "Story Planner"
    description: "Reads PROMPT.md queue, finds next un-evaluated module, writes research plan."
    triggers: ["health.ok", "module.committed"]
    publishes: ["plan.ready", "queue.complete"]
    instructions: |
      Read /Users/jamesilsley/GitHub/spark-mojo-platform/PROMPT.md.

      Find the first module in the queue without a COMPLETE marker at
      /Users/jamesilsley/GitHub/spark-mojo-platform/.
      COMPLETE markers are files named: MEGA-001-COMPLETE, MEGA-002-COMPLETE, etc.

      If all 18 modules have COMPLETE or BLOCKED markers:
        Ensure ERPNEXT_APP_EVALUATION.md summary table is complete.
        Write MEGA-RUN-COMPLETE at repo root.
        Print LOOP_COMPLETE
        ralph emit "queue.complete" "all 18 modules evaluated"
        Stop.

      Otherwise:
        Write PLAN-MEGA-NNN.md at repo root with:
          - Module name and story ID
          - App it belongs to (erpnext / crm / hrms / etc.)
          - The 5 behavioral health relevance questions to answer
          - Specific DocTypes to investigate (look up in Frappe before writing)
          - API endpoints to test

        ralph emit "plan.ready" "MEGA-NNN: [module name] — plan written"

  researcher:
    name: "Researcher"
    description: "Executes the evaluation protocol for one module. Pure research — no code written."
    triggers: ["plan.ready", "research.retry"]
    publishes: ["research.ready", "research.blocked"]
    instructions: |
      Read PLAN-MEGA-NNN.md from /Users/jamesilsley/GitHub/spark-mojo-platform/.

      Execute the Per-Story Evaluation Protocol from PROMPT.md exactly:

      STEP 1 — Confirm module is live on poc-dev.sparkmojo.com
        Use Frappe REST API with session cookie from /tmp/frappe-eval-cookies.txt
        If cookie is stale, re-login: same curl command as health_check Step 3

      STEP 2 — Enumerate key DocTypes
        For each DocType in this module:
          - List all fields via frappe.get_meta
          - Identify Link fields (relationships to other DocTypes)
          - Identify Table fields (child tables)
          - Count existing records: frappe.db.count('[DocType]')
        Take notes. This is the evidence base for the verdict.

      STEP 3 — Test REST API connectivity
        For the 2-3 most important DocTypes:
          curl -s "https://poc-dev.sparkmojo.com/api/resource/[DocType]?limit=3&fields=[\"name\",\"creation\"]" \
            -b /tmp/frappe-eval-cookies.txt
        Note: Does it return data? What fields? Any errors?

      STEP 4 — Answer all 5 behavioral health relevance questions explicitly
        Do not skip any question. Write a 1-3 sentence answer for each.

      STEP 5 — Write the classification entry
        Do NOT append to ERPNEXT_APP_EVALUATION.md yet. Write it to a temp file:
        /tmp/MEGA-NNN-entry.md
        Include all sections from the template in PROMPT.md.
        Choose one verdict: USE-AS-IS / CONFIGURE-AND-SURFACE / REPLACE-WITH-BEST-OF-BREED / DEFER / EXCLUDE
        Include specific evidence for the verdict choice.

      If module is broken or completely inaccessible:
        Write BLOCKED-MEGA-NNN.md with exact error.
        ralph emit "research.blocked" "MEGA-NNN: [module] — [reason]"
        Stop.

      Otherwise:
        ralph emit "research.ready" "MEGA-NNN: [module] — verdict: [VERDICT] — research complete"

  writer:
    name: "Writer"
    description: "Appends the classification entry to ERPNEXT_APP_EVALUATION.md and commits."
    triggers: ["research.ready"]
    publishes: ["module.committed"]
    instructions: |
      Read /tmp/MEGA-NNN-entry.md (from researcher hat output).

      Append the entry to:
        /Users/jamesilsley/GitHub/sparkmojo-internal/platform/architecture/ERPNEXT_APP_EVALUATION.md

      Also update the summary table at the top of the document with this module's verdict.

      Commit to sparkmojo-internal:
        cd /Users/jamesilsley/GitHub/sparkmojo-internal
        git add platform/architecture/ERPNEXT_APP_EVALUATION.md
        git commit -m "eval: MEGA-NNN [module name] — verdict: [VERDICT]"
        git push origin main

      Write COMPLETE marker in platform repo:
        touch /Users/jamesilsley/GitHub/spark-mojo-platform/MEGA-NNN-COMPLETE

      Write QUEUE-STATUS.md at platform repo root with:
        - Modules completed so far (list with verdicts)
        - Modules remaining
        - Any BLOCKED items

      ralph emit "module.committed" "MEGA-NNN: [module] committed — verdict: [VERDICT]"
