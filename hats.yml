cli:
  backend: "claude"
event_loop:
  starting_event: "session.start"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 120
  max_runtime_seconds: 28800
adapters:
  claude:
    timeout: 1200
core:
  guardrails:
    - "Never modify CLAUDE.md, PROCESS.md, or PLATFORM-GUARDRAILS.md"
    - "Never use TypeScript - all frontend files are .jsx"
    - "Never hardcode hex colors - use var(--sm-*) tokens"
    - "React NEVER calls Frappe directly - always via /api/modules/[capability]/[action]"
    - "Governance repo: /Users/jamesilsley/GitHub/sparkmojo-internal/"
    - "Platform repo: /Users/jamesilsley/GitHub/spark-mojo-platform/"
    - "Docker compose requires -f docker-compose.poc.yml"
    - "Deploy: ssh sparkmojo 'cd /home/ops/spark-mojo-platform && ./deploy.sh'"
    - "Never use docker compose restart as substitute for deploy.sh"
    - "When ambiguous on architecture: write BLOCKED-[STORY-ID].md and skip"
    - "Frappe backend container: frappe-poc-backend-1"
    - "env.poc path: /home/ops/spark-mojo-platform/.env.poc"
memories:
  enabled: true
  inject: auto
  budget: 2000
tasks:
  enabled: true
hats:
  health_check:
    name: "Health Check"
    description: "Verifies baseline health before build work. Confirms test baseline, repos clean, no stale fix-run artifacts, VPS reachable."
    triggers: ["session.start"]
    publishes: ["health.ok"]
    max_activations: 1
    instructions: |
      Working directory: /Users/jamesilsley/GitHub/spark-mojo-platform/
      Run baseline checks in order. If any fail, write HEALTH-BLOCKED.md at
      repo root with exact failure, then print LOOP_COMPLETE. Do not emit
      any other event.
      Check 1 - Abstraction layer test baseline:
        docker exec spark-mojo-platform-poc-api-1 python -m pytest tests/ -q --tb=no 2>&1 | tail -5
        PASS: total failures <= 26 and all failures are in test_tasks.py only
        FAIL: failures in any other file
      Check 2 - Platform repo clean and on main:
        cd /Users/jamesilsley/GitHub/spark-mojo-platform
        git status --porcelain (must return nothing)
        git branch --show-current (must be main)
      Check 3 - Governance repo clean and on main:
        cd /Users/jamesilsley/GitHub/sparkmojo-internal
        git status --porcelain (must return nothing)
        git branch --show-current (must be main)
      Check 4 - No stale FIX-41 artifacts:
        cd /Users/jamesilsley/GitHub/spark-mojo-platform
        ls FIX-41-*-COMPLETE BLOCKED-FIX-41-*.md PLAN-FIX-41-*.md RETRY-FIX-41-*.count 2>/dev/null
        Must find nothing.
      Check 5 - VPS reachable:
        ssh sparkmojo 'echo OK'
        Must print OK.
      If all pass:
        Create QUEUE-PROGRESS.md:
          "# Queue Progress - Session 42 Fix Run\nStarted: [timestamp]\n"
        ralph emit "health.ok" "All checks passed."
      If ANY fail:
        Write HEALTH-BLOCKED.md with exact failure.
        Print LOOP_COMPLETE.
  story_planner:
    name: "Story Planner"
    description: "Finds next buildable FIX-41 story, checks dependencies, writes PLAN file."
    triggers: ["health.ok", "story.committed", "story.skipped"]
    publishes: ["plan.ready", "story.skipped"]
    max_activations: 24
    instructions: |
      Working directory: /Users/jamesilsley/GitHub/spark-mojo-platform/
      Read PROMPT.md. Check for COMPLETE and BLOCKED markers at repo root.
      Story IDs: FIX-41-001a, FIX-41-001b, FIX-41-001c, FIX-41-001d,
                 FIX-41-002, FIX-41-003, FIX-41-005a, FIX-41-005b
      Step 1 - Queue completion check:
        A story is FINISHED if [ID]-COMPLETE or BLOCKED-[ID].md exists.
        If all 8 are FINISHED:
          Write QUEUE-COMPLETE.md with results summary table.
          Print LOOP_COMPLETE.
          Stop.
      Step 2 - Find next buildable story (top to bottom):
        a. COMPLETE marker exists? Skip.
        b. BLOCKED marker exists? Skip.
        c. All stories have Dependencies: None - skip dependency check.
        d. RETRY-[ID].count >= 5? Write BLOCKED, emit story.skipped.
      Step 3 - Write plan:
        Read full story spec from path in PROMPT.md.
        Write PLAN-[STORY-ID].md: story ID, branch name or "no-branch",
        type, files to touch, gate commands, retry count.
        Append to QUEUE-PROGRESS.md: "[ID]: started at [timestamp] (attempt [N])"
        ralph emit "plan.ready" "[ID]: plan written, type: [type]"
  builder:
    name: "Builder"
    description: "Implements the plan exactly. Runs fast gates. Never improvises on architecture."
    triggers: ["plan.ready", "build.retry"]
    publishes: ["build.ready", "story.skipped"]
    max_activations: 24
    instructions: |
      Read PLAN-[STORY-ID].md at repo root.
      If this is a retry (triggered by build.retry):
        Read the "## Retry Notes" section in PLAN-[STORY-ID].md.
        Address that specific failure before re-running gates.
      Determine story type from plan.
      CODE stories (FIX-41-001a through FIX-41-001d, FIX-41-002):
        cd /Users/jamesilsley/GitHub/spark-mojo-platform
        git checkout main && git pull origin main
        If branch exists: git checkout story/[name] && git merge main
        If new: git checkout -b story/[name]
        Build exactly what plan and spec say. Nothing more.
        Lint gate (scoped to changed files only):
          CHANGED=$(git diff --name-only main...HEAD | grep '\.py$' | tr '\n' ' ')
          if [ -n "$CHANGED" ]; then python -m flake8 $CHANGED; fi
        Fast gate:
          docker exec spark-mojo-platform-poc-api-1 python -m pytest tests/ -x -q --tb=short 2>&1 | tail -10
      INFRA story (FIX-41-003):
        No branch. Execute SSH commands from spec directly.
        Verify outcome of each step before continuing.
      DOCS stories (FIX-41-005a, FIX-41-005b):
        cd /Users/jamesilsley/GitHub/sparkmojo-internal
        Read each story spec before writing its artifacts.
        Create directories and write all required files.
        Fast gate: ls -la each output directory and confirm all files exist.
      If architectural ambiguity:
        Write BLOCKED-[STORY-ID].md. Append to QUEUE-PROGRESS.md.
        ralph emit "story.skipped" "[ID]: architectural ambiguity"
        Stop.
      On useful discovery:
        ralph tools memory add "description" -t fix --tags fix-run-42
      When fast gates pass:
        ralph emit "build.ready" "[ID]: implementation complete, fast gates pass"
  verifier:
    name: "Verifier"
    description: "Runs full gate suite per story type. Enforces 5-retry budget. Does not mark stories complete."
    triggers: ["build.ready"]
    publishes: ["story.verified", "build.retry", "story.skipped"]
    max_activations: 24
    instructions: |
      Read PLAN-[STORY-ID].md. Run ALL gates for this story type.
      FIX-41-001a (BILL-011 webhook route):
        Gate 1 - Test suite (no new failures outside test_tasks.py):
          docker exec spark-mojo-platform-poc-api-1 python -m pytest tests/ -q --tb=no 2>&1 | tail -5
        Gate 2 - Route smoke test:
          ssh sparkmojo 'curl -s -o /tmp/r.json -w "%{http_code}" -X POST
          https://api.poc.sparkmojo.com/api/modules/billing/webhooks/277ca
          -H "Content-Type: application/json"
          -d "{\"stedi_transaction_id\":\"T\",\"claim_control_number\":\"X\",\"stc_category\":\"A1\",\"stc_status\":\"t\"}"
          && cat /tmp/r.json'
          PASS: HTTP 200 with status:warning
        Gate 3 - Deploy:
          ssh sparkmojo 'cd /home/ops/spark-mojo-platform && ./deploy.sh'
        Gate 4 - Post-deploy recheck smoke test. PASS: still HTTP 200.
      FIX-41-001b (BILL-018 appeals route):
        Gate 1 - Test suite clean.
        Gate 2 - Route smoke: POST /api/modules/billing/appeals/transition
          with {"appeal_id":"X","new_state":"submitted"}
          PASS: HTTP 404 or 422 with app-level message (NOT generic {"detail":"Not Found"})
        Gate 3 - Deploy.
        Gate 4 - Post-deploy recheck.
      FIX-41-001c (BILL-020 AR aging route):
        Gate 1 - Test suite clean.
        Gate 2 - Route smoke: GET /api/modules/billing/ar/aging
          PASS: HTTP 200
        Gate 3 - Deploy.
        Gate 4 - Post-deploy recheck.
      FIX-41-001d (BILL-021 wildcard fix):
        Gate 1 - Test suite clean.
        Gate 2 - Route smoke: GET /api/modules/billing/denials/analytics
          PASS: HTTP 200 with analytics structure
          FAIL: {"detail":"SM Denial 'analytics' not found"}
        Gate 3 - Also verify /api/modules/billing/denials/[real-denial-name]
          still works (wildcard route not broken).
        Gate 4 - Deploy.
        Gate 5 - Post-deploy recheck both routes.
      FIX-41-002 (auth fixture):
        Gate 1 - test_tasks.py zero failures:
          docker exec spark-mojo-platform-poc-api-1 python -m pytest tests/test_tasks.py -q --tb=no 2>&1 | tail -5
          PASS: 0 failed
        Gate 2 - Full suite zero failures:
          docker exec spark-mojo-platform-poc-api-1 python -m pytest tests/ -q --tb=no 2>&1 | tail -5
          PASS: 0 failed
        Gate 3 - Deploy.
      FIX-41-003 (OAuth host_name):
        Gate 1 - host_name correct:
          ssh sparkmojo 'docker exec frappe-poc-backend-1 bench --site poc-dev.sparkmojo.com config show 2>&1 | grep host_name'
          PASS: shows "https://poc-dev.sparkmojo.com"
        Gate 2 - Frappe accessible:
          curl -s -o /dev/null -w "%{http_code}" https://poc-dev.sparkmojo.com/app
          PASS: 200 or 302
      FIX-41-005a (KB billing-a):
        Gate - All 12 files exist:
          ls /Users/jamesilsley/GitHub/sparkmojo-internal/platform/knowledge-base/billing/BILL-011-277ca-webhook/
          ls /Users/jamesilsley/GitHub/sparkmojo-internal/platform/knowledge-base/billing/BILL-012-835-era-integration/
          ls /Users/jamesilsley/GitHub/sparkmojo-internal/platform/knowledge-base/billing/BILL-014-ai-denial-classification/
          ls /Users/jamesilsley/GitHub/sparkmojo-internal/platform/knowledge-base/billing/BILL-015-denial-worklist/
          PASS: each directory contains DEPLOYMENT.md, DEFICIENCIES.md, EXTENSION-ROADMAP.md
      FIX-41-005b (KB billing-b):
        Gate - All 15 files exist:
          ls /Users/jamesilsley/GitHub/sparkmojo-internal/platform/knowledge-base/billing/BILL-017-appeal-letter-generation/
          ls /Users/jamesilsley/GitHub/sparkmojo-internal/platform/knowledge-base/billing/BILL-018-appeal-transitions/
          ls /Users/jamesilsley/GitHub/sparkmojo-internal/platform/knowledge-base/billing/BILL-019-ar-summary/
          ls /Users/jamesilsley/GitHub/sparkmojo-internal/platform/knowledge-base/billing/BILL-020-ar-aging/
          ls /Users/jamesilsley/GitHub/sparkmojo-internal/platform/knowledge-base/billing/BILL-021-denial-analytics/
          PASS: each directory contains DEPLOYMENT.md, DEFICIENCIES.md, EXTENSION-ROADMAP.md
      Retry budget for all stories:
        Read RETRY-[ID].count (0 if missing). Increment on failure. Write back.
        >= 5: Write BLOCKED-[ID].md, append to QUEUE-PROGRESS.md,
              git checkout main (if on feature branch),
              rm -f RETRY-[ID].count,
              ralph emit "story.skipped" "[ID]: blocked after 5 failures"
              Stop.
        < 5: Append failure to PLAN-[ID].md under "## Retry Notes",
             ralph emit "build.retry" "[ID]: attempt [N]/5 failed. [exact error]"
      All gates pass:
        ralph emit "story.verified" "[ID]: all gates pass. [brief summary]"
  committer:
    name: "Committer"
    description: "Commits verified work, merges to main, deploys if code story, marks complete, cleans up."
    triggers: ["story.verified"]
    publishes: ["story.committed"]
    max_activations: 12
    instructions: |
      Read PLAN-[STORY-ID].md. Determine story type.
      CODE stories (FIX-41-001a through FIX-41-001d, FIX-41-002):
        cd /Users/jamesilsley/GitHub/spark-mojo-platform
        git add -A
        git commit -m "[commit message from story spec]"
        git push origin story/[branch]
        git checkout main && git pull origin main
        git merge story/[branch] && git push origin main
        ssh sparkmojo 'cd /home/ops/spark-mojo-platform && ./deploy.sh'
        On deploy failure:
          Write BLOCKED-[STORY-ID]-DEPLOY.md with full deploy output.
          Do NOT touch COMPLETE marker.
          Append to QUEUE-PROGRESS.md: "[ID]: BLOCKED (deploy failed) at [timestamp]"
          Continue to cleanup and emit below.
        On deploy success:
          touch [STORY-ID]-COMPLETE
          Append to QUEUE-PROGRESS.md: "[ID]: COMPLETE at [timestamp]"
        Cleanup either way:
          rm -f PLAN-[STORY-ID].md RETRY-[STORY-ID].count
      INFRA story (FIX-41-003):
        No git commit.
        touch FIX-41-003-COMPLETE
        rm -f PLAN-FIX-41-003.md
        Append to QUEUE-PROGRESS.md: "FIX-41-003: COMPLETE at [timestamp]"
      DOCS stories (FIX-41-005a, FIX-41-005b):
        cd /Users/jamesilsley/GitHub/sparkmojo-internal
        git add platform/knowledge-base/
        git commit -m "[commit message from story spec]"
        git push origin main
        cd /Users/jamesilsley/GitHub/spark-mojo-platform
        touch [STORY-ID]-COMPLETE
        rm -f PLAN-[STORY-ID].md RETRY-[STORY-ID].count
        Append to QUEUE-PROGRESS.md: "[ID]: COMPLETE at [timestamp]"
      ALWAYS emit regardless of deploy outcome:
        ralph emit "story.committed" "[ID]: committed, merged, [deployed/deploy-FAILED/infra-complete/docs-committed]."
