cli:
  backend: "claude"

event_loop:
  starting_event: "session.start"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 150
  max_runtime_seconds: 28800

core:
  guardrails:
    - "Absolute path to this repo: /Users/jamesilsley/GitHub/spark-mojo-platform/"
    - "Absolute path to governance repo: /Users/jamesilsley/GitHub/sparkmojo-internal/"
    - "Story files: /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/"
    - "NEVER modify frontend/src/pages/index.jsx routing structure — only add alongside existing routes"
    - "NEVER use TypeScript — all files are .jsx"
    - "NEVER hardcode hex colors in component files — use var(--sm-*) tokens"
    - "NEVER use Tailwind color classes (bg-teal-600, text-red-500) — use token-mapped utilities"
    - "React NEVER calls Frappe directly — always via /api/modules/[capability]/[action]"
    - "After every commit, merge branch to main and delete feature branch before starting next story"

hats:
  health_check:
    name: "Health Check"
    description: "Verifies baseline repo health before any build work begins. Halts if broken."
    triggers: ["session.start"]
    publishes: ["health.ok", "health.blocked"]
    max_activations: 1
    instructions: |
      Run baseline checks in order. If any fail, write HEALTH-BLOCKED.md with details and emit health.blocked.

      1. Clean up junk files first:
         find frontend/src/components/ -name $'Icon\r' -delete
         If any were found: git add -A && git commit -m "chore: remove Icon carriage-return junk files"

      2. cd /Users/jamesilsley/GitHub/spark-mojo-platform/frontend && pnpm install
         PASS: exits 0

      3. cd /Users/jamesilsley/GitHub/spark-mojo-platform/frontend && pnpm run build
         PASS: exits 0

      4. Verify key files exist:
         - frontend/src/styles/tokens.css
         - frontend/src/pages/Library.jsx
         - frontend/src/components/mojos/WorkboardMojo.jsx
         - frontend/src/components/ui/StatsCard.jsx

      If all pass: ralph emit "health.ok" "build clean, key files present, junk removed"

  story_planner:
    name: "Story Planner"
    description: "Reads next story from queue, confirms dependencies met, writes build plan."
    triggers: ["health.ok", "story.committed"]
    publishes: ["plan.ready", "queue.complete"]
    instructions: |
      Read /Users/jamesilsley/GitHub/spark-mojo-platform/PROMPT.md.
      Find the first story without a STORY-NNN-COMPLETE marker file at repo root.
      If all stories are done (STORY-011-COMPLETE, STORY-012-COMPLETE, STORY-013-COMPLETE all exist):
        Run the TASK-ADR cleanup if ADR-design-system.md still has full content (not just the pointer).
        If ADR cleanup also done: print LOOP_COMPLETE. Emit queue.complete. Stop.

      For the next story:
      1. Read the full story spec from /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/STORY-NNN.md
      2. Read all files listed in the story's "Read Before Starting" section
      3. Check dependency: if story depends on a prior story, verify the COMPLETE marker exists
         - If dependency not met, write BLOCKED-STORY-NNN.md and emit plan.ready for the next eligible story
      4. Write PLAN-STORY-NNN.md listing: files to create/modify, tokens to add, gates to run
      5. ralph emit "plan.ready" "STORY-NNN: [description], [file count] files"

  builder:
    name: "Builder"
    description: "Implements the current story plan. Runs fast gates after each change. Emits build.ready when done."
    triggers: ["plan.ready", "build.retry"]
    publishes: ["build.ready", "build.blocked"]
    instructions: |
      Read PLAN-STORY-NNN.md from repo root.
      If plan says BLOCKED, skip to next story or emit build.blocked.

      Create feature branch:
        git checkout main && git pull origin main
        git checkout -b story/STORY-NNN-description

      Read the full story spec again:
        /Users/jamesilsley/GitHub/sparkmojo-internal/platform/feature-library/stories/STORY-NNN.md

      Build exactly what the spec says. Nothing more. Nothing less.

      After each significant file change, run fast gate:
        cd /Users/jamesilsley/GitHub/spark-mojo-platform/frontend && pnpm run build

      Important build notes:
      - STORY-011: Count actual files in ui/ and mojo-patterns/ for the inventory — don't hardcode "59".
        Use: ls frontend/src/components/ui/*.jsx | wc -l
        and: ls frontend/src/components/mojo-patterns/*.jsx | wc -l
      - STORY-012: Run the grep acceptance criteria BEFORE making changes (document baseline).
        Then run again AFTER to prove the violations are gone.
      - STORY-013: Try CLI install first. If it fails, manually copy the component source.
        The component MUST wire to document.documentElement.dataset.theme, not a class-based toggle.

      When build is complete and fast gates pass:
        ralph emit "build.ready" "STORY-NNN: implementation complete, build passes"

  verifier:
    name: "Verifier"
    description: "Runs full gate suite for the current story. Only hat that can mark stories done."
    triggers: ["build.ready"]
    publishes: ["task.done", "build.retry"]
    instructions: |
      Determine which story was just built (check current branch name or PLAN file).

      Run ALL gates for this story type. A story is done ONLY when every gate passes.

      === STORY-011 Gates ===
      1. cd /Users/jamesilsley/GitHub/spark-mojo-platform/frontend && pnpm run build — exit 0
      2. test -f frontend/src/components/COMPONENT_INVENTORY.md — file exists
      3. grep -rn '#[0-9a-fA-F]\{6\}' frontend/src/pages/Library.jsx — no NEW hex (compare to pre-existing)
      4. cat frontend/src/components/ui/StatsCard.jsx — re-export shim only
      5. cat frontend/src/components/mojo-patterns/StatsCard.jsx — full implementation
      6. Open Library.jsx and verify every component in ui/ and mojo-patterns/ has a rendered section

      === STORY-012 Gates ===
      1. grep -rn 'bg-emerald\|bg-blue\|bg-purple\|bg-amber\|bg-teal-\|text-teal-\|text-amber-\|text-orange-' frontend/src/components/mojo-patterns/StatsCard.jsx — 0 results
      2. grep -rn '#[0-9a-fA-F]\{6\}' frontend/src/components/mojos/WorkboardMojo.jsx — 0 results
      3. grep -rn 'bg-teal\|text-teal\|bg-amber\|text-amber\|bg-orange\|text-orange' frontend/src/components/mojos/WorkboardMojo.jsx — 0 results
      4. cd /Users/jamesilsley/GitHub/spark-mojo-platform/frontend && pnpm run build — exit 0

      === STORY-013 Gates ===
      1. test -f frontend/src/components/magicui/animated-theme-toggler.jsx — file exists
      2. grep -c 'AnimatedThemeToggler' frontend/src/pages/Library.jsx — at least 1 match
      3. grep -c 'Universal Components' frontend/src/pages/Library.jsx — at least 1 match
      4. grep -c 'AnimatedThemeToggler' frontend/src/components/COMPONENT_INVENTORY.md — at least 1 match
      5. cd /Users/jamesilsley/GitHub/spark-mojo-platform/frontend && pnpm run build — exit 0

      If ALL gates pass:
        touch STORY-NNN-COMPLETE
        ralph emit "task.done" "STORY-NNN: all gates pass — [list results]"

      If ANY gate fails:
        ralph emit "build.retry" "STORY-NNN: FAILED — [exact command, exact error, line number]"

  committer:
    name: "Committer"
    description: "Commits verified work, merges to main, cleans up branch."
    triggers: ["task.done"]
    publishes: ["story.committed"]
    instructions: |
      Determine which story was just verified (check STORY-NNN-COMPLETE marker).

      1. Stage all changes:
         git add -A

      2. Read the commit message from the story spec ("Commit Message" section at bottom of story file).
         Use that exact message.
         git commit -m "[exact message from story]"

      3. Merge to main:
         git checkout main
         git merge story/STORY-NNN-description --no-edit
         git branch -d story/STORY-NNN-description

      4. Verify main builds:
         cd /Users/jamesilsley/GitHub/spark-mojo-platform/frontend && pnpm run build

      5. Push:
         git push origin main

      ralph emit "story.committed" "STORY-NNN committed and merged to main"

  cleanup:
    name: "Cleanup"
    description: "Sweeps all Ralph-generated artifacts from repo root into docarchive/ralph-runs/YYYY-MM-DD/. Always runs last."
    triggers: ["queue.complete", "story.committed"]
    publishes: ["cleanup.done"]
    max_activations: 1
    instructions: |
      Your only job is to move Ralph's run artifacts out of the repo root.

      Get today's date: run `date +%Y-%m-%d` and use that value everywhere below as DATE.

      Create the archive folder if it doesn't exist:
        mkdir -p /Users/jamesilsley/GitHub/spark-mojo-platform/docarchive/ralph-runs/DATE

      Move all of the following into that folder (if they exist — skip silently if not):
        - All files matching PLAN-*.md in the repo root
        - All files matching *-COMPLETE (with or without .md extension) in the repo root
        - NIGHT1-COMPLETE.md, QUEUE-COMPLETE.md, and any other *-COMPLETE*.md run-level files

      Do NOT move any of the following:
        - CLAUDE.md
        - PROMPT.md
        - hats.yml
        - README.md
        - DEPLOY.md
        - deploy.sh
        - docker-compose.poc.yml
        - playwright.config.ts
        - Any file whose name begins with BLOCKED-

      After moving all files:
        git add -A
        git commit -m "chore: archive Ralph run artifacts DATE"
        git push origin main

      ralph emit "cleanup.done" "Run artifacts archived to docarchive/ralph-runs/DATE"
