cli:
  backend: "claude"
event_loop:
  starting_event: "session.start"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 75
  max_runtime_seconds: 28800
core:
  guardrails:
    - "Never modify CLAUDE.md, PROCESS.md, or PLATFORM-GUARDRAILS.md"
    - "Never use TypeScript — all frontend files are .jsx"
    - "Never hardcode hex colors — use var(--sm-*) tokens"
    - "React NEVER calls Frappe directly — always via /api/modules/[capability]/[action]"
    - "Governance repo: /Users/jamesilsley/GitHub/sparkmojo-internal/"
    - "Platform repo: /Users/jamesilsley/GitHub/spark-mojo-platform/"
    - "Docker compose requires -f docker-compose.poc.yml"
    - "Deploy command: ssh sparkmojo 'cd /home/ops/spark-mojo-platform && ./deploy.sh'"
    - "Never use docker compose restart as a substitute for deploy.sh"
    - "If ambiguous on architecture, write BLOCKED-[STORY-ID].md and skip to next story"
    - "Lint gate: 53 pre-existing ESLint errors exist in WikiMojo.jsx — do not block on these"
memories:
  enabled: true
  inject: auto
  budget: 2000
tasks:
  enabled: true
hats:
  health_check:
    name: "Health Check"
    description: "Verifies baseline health before build work. Confirms 172 abstraction layer tests pass, repos are clean, no stale fix-run artifacts, VPS reachable."
    triggers: ["session.start"]
    publishes: ["health.ok"]
    max_activations: 1
    instructions: |
      Run baseline checks in order. If any fail, write HEALTH-BLOCKED.md at repo root
      with exact failure, then print LOOP_COMPLETE. Do not emit any other event.
      Working directory: /Users/jamesilsley/GitHub/spark-mojo-platform/
      Check 1 — Abstraction layer test baseline:
        docker exec spark-mojo-platform-poc-api-1 python -m pytest tests/ -q --tb=no 2>&1 | tail -5
        PASS: total failures <= 39 and all failures are in test_tasks.py only
        FAIL: failures in any other file, or more than 39 total
      Check 2 — Platform repo clean and on main:
        git status --porcelain  (must return nothing)
        git branch --show-current  (must be main)
      Check 3 — Governance repo clean and on main:
        cd /Users/jamesilsley/GitHub/sparkmojo-internal
        git status --porcelain  (must return nothing)
        git branch --show-current  (must be main)
      Check 4 — No stale FIX-41 artifacts:
        cd /Users/jamesilsley/GitHub/spark-mojo-platform
        ls FIX-41-*-COMPLETE BLOCKED-FIX-41-*.md PLAN-FIX-41-*.md HEALTH-BLOCKED.md RETRY-FIX-41-*.count 2>/dev/null
        Must find nothing. Old BILL-* and WKBD-* markers from Session 40 are fine.
      Check 5 — VPS reachable:
        ssh sparkmojo 'echo OK'
        Must print OK.
      If all pass:
        Create QUEUE-PROGRESS.md:
          "# Queue Progress - Session 41 Fix Run\nStarted: [timestamp]\n"
        ralph emit "health.ok" "All checks passed. Baseline tests confirmed. Repos clean. VPS reachable."
      If ANY fail:
        Write HEALTH-BLOCKED.md with exact failure.
        Print LOOP_COMPLETE.
  story_planner:
    name: "Story Planner"
    description: "Finds next buildable FIX-41 story, checks dependencies, writes PLAN file."
    triggers: ["health.ok", "story.committed", "story.skipped"]
    publishes: ["plan.ready", "story.skipped"]
    max_activations: 15
    instructions: |
      Working directory: /Users/jamesilsley/GitHub/spark-mojo-platform/
      Read PROMPT.md. Check for COMPLETE and BLOCKED markers at repo root.
      Story IDs for this run: FIX-41-001, FIX-41-002, FIX-41-003, FIX-41-004, FIX-41-005
      Step 1 — Queue completion check:
        A story is FINISHED if [STORY-ID]-COMPLETE or BLOCKED-[STORY-ID].md exists.
        If all 5 are FINISHED:
          Write QUEUE-COMPLETE.md with results summary table.
          Print LOOP_COMPLETE.
          Stop.
      Step 2 — Find next buildable story (top to bottom):
        a. COMPLETE marker exists? Skip.
        b. BLOCKED marker exists? Skip.
        c. Check dependencies per PROMPT.md:
           - FIX-41-001: None
           - FIX-41-002: None
           - FIX-41-003: None
           - FIX-41-004: depends on FIX-41-003
           - FIX-41-005: None
           If dependency BLOCKED: write BLOCKED-[ID].md, emit story.skipped.
           If dependency not yet COMPLETE: skip for now (not reached yet).
           If all dependencies COMPLETE: buildable.
        d. RETRY-[ID].count >= 5? Write BLOCKED, emit story.skipped.
      Step 3 — Write plan:
        Read full story spec from PROMPT.md.
        Write PLAN-[STORY-ID].md: story ID, branch name or "no-branch",
        type (code/infra/docs), files to touch, gate commands, retry count.
        Append to QUEUE-PROGRESS.md: "[ID]: started at [timestamp] (attempt [N])"
        ralph emit "plan.ready" "[ID]: plan written, type: [type]"
  builder:
    name: "Builder"
    description: "Implements the plan exactly. Runs fast gates. Never improvises on architecture."
    triggers: ["plan.ready", "build.retry"]
    publishes: ["build.ready", "story.skipped"]
    max_activations: 15
    instructions: |
      Read PLAN-[STORY-ID].md at repo root. Determine story type.
      CODE stories (FIX-41-001, FIX-41-002):
        cd /Users/jamesilsley/GitHub/spark-mojo-platform
        git checkout main && git pull origin main
        If branch exists (retry): git checkout story/[name] && git merge main
        If new: git checkout -b story/[name]
        Build exactly what plan and spec say. Nothing more.
        Fast gate after each significant change:
          docker exec spark-mojo-platform-poc-api-1 python -m pytest tests/ -x -q --tb=short 2>&1 | tail -10
        If architectural ambiguity: write BLOCKED-[ID].md, emit story.skipped.
        On useful discovery: ralph tools memory add "description" -t fix --tags fix-run-41
      INFRA stories (FIX-41-003, FIX-41-004):
        No branch. Execute SSH commands from plan directly.
        Fast gate: verify expected outcome of each step before continuing.
        If a step fails in a way that is reversible: reverse it, write BLOCKED-[ID].md.
      KB story (FIX-41-005):
        cd /Users/jamesilsley/GitHub/sparkmojo-internal
        Create all required directories and write all artifact files.
        Read each story spec before writing its artifacts.
        Fast gate: ls -la each directory and confirm all required files exist.
        WKBD-001 has elevated requirements — re-read the KB Artifacts section
        of its spec before writing any WKBD-001 artifact.
      When fast gates pass:
        ralph emit "build.ready" "[ID]: implementation complete, fast gates pass"
  verifier:
    name: "Verifier"
    description: "Runs full gate suite per story type. Enforces 5-retry budget. Does not mark stories complete."
    triggers: ["build.ready"]
    publishes: ["story.verified", "build.retry", "story.skipped"]
    max_activations: 15
    instructions: |
      Read PLAN-[STORY-ID].md. Run ALL gates for this story type.
      FIX-41-001 (Route Registration):
        Gate 1 — Test suite clean (no new failures):
          docker exec spark-mojo-platform-poc-api-1 python -m pytest tests/ -q --tb=no 2>&1 | tail -5
          PASS: failures only in test_tasks.py (<= 26), none elsewhere
        Gate 2 — All 4 routes smoke tested:
          Run all 4 curl checks from story spec. PASS: all return 200.
        Gate 3 — Deploy succeeds:
          ssh sparkmojo 'cd /home/ops/spark-mojo-platform && ./deploy.sh'
          PASS: exits 0
        Gate 4 — Post-deploy smoke recheck all 4 routes:
          PASS: all 4 still 200 after deploy
      FIX-41-002 (Auth Fixture):
        Gate 1 — test_tasks.py zero failures:
          docker exec spark-mojo-platform-poc-api-1 python -m pytest tests/test_tasks.py -v --tb=short 2>&1 | tail -20
          PASS: 0 failures
        Gate 2 — Full suite zero failures:
          docker exec spark-mojo-platform-poc-api-1 python -m pytest tests/ -q --tb=no 2>&1 | tail -5
          PASS: 0 failures
        Gate 3 — Deploy:
          ssh sparkmojo 'cd /home/ops/spark-mojo-platform && ./deploy.sh'
          PASS: exits 0
      FIX-41-003 (OAuth host_name):
        Gate 1 — host_name correct in site config:
          ssh sparkmojo 'docker exec frappe-poc-backend-1 bench --site poc-dev.sparkmojo.com config show 2>&1 | grep host_name'
          PASS: shows "https://poc-dev.sparkmojo.com"
        Gate 2 — Frappe accessible:
          curl -s -o /dev/null -w "%{http_code}" https://poc-dev.sparkmojo.com/app
          PASS: 200 or 302
      FIX-41-004 (Container Cleanup):
        Gate 1 — frappe-poc-frontend-1 stopped:
          ssh sparkmojo 'docker ps --filter name=frappe-poc-frontend-1 --format "{{.Status}}"'
          PASS: empty or Exited
        Gate 2 — Active frontend works:
          curl -s -o /dev/null -w "%{http_code}" https://app.poc.sparkmojo.com
          PASS: 200
          FAIL: restart frappe-poc-frontend-1 immediately, write BLOCKED-FIX-41-004.md
      FIX-41-005 (KB Artifacts):
        Gate 1 — All 10 directories exist in governance repo.
        Gate 2 — All 32 files present (27 billing + 5 WKBD-001).
        Gate 3 — WKBD-001 USER-GUIDE.md has >= 15 FAQ entries.
        Gate 4 — WKBD-001 INTERNAL-PLAYBOOK.md contains heading
          "This Is Foundation, Not Finish Line".
      Retry budget:
        Read RETRY-[ID].count (0 if missing). Increment on failure. Write back.
        >= 5: write BLOCKED-[ID].md, append to QUEUE-PROGRESS.md,
               git checkout main (if on feature branch),
               rm -f RETRY-[ID].count,
               ralph emit "story.skipped" "[ID]: blocked after 5 failures"
        < 5: append to PLAN ## Retry Notes,
             ralph emit "build.retry" "[ID]: attempt [N]/5 failed. [exact error]"
      All gates pass:
        ralph emit "story.verified" "[ID]: all gates pass. [brief summary]"
  committer:
    name: "Committer"
    description: "Commits verified work, merges to main, deploys if code story, marks complete, cleans up plan files."
    triggers: ["story.verified"]
    publishes: ["story.committed"]
    max_activations: 8
    instructions: |
      Read PLAN-[STORY-ID].md. Determine story type.
      CODE stories (FIX-41-001, FIX-41-002):
        cd /Users/jamesilsley/GitHub/spark-mojo-platform
        git add -A
        git commit -m "[commit message from story spec in PROMPT.md]"
        git push origin story/[branch]
        git checkout main && git pull origin main
        git merge story/[branch] && git push origin main
        ssh sparkmojo 'cd /home/ops/spark-mojo-platform && ./deploy.sh'
        On deploy failure: write BLOCKED-[ID]-DEPLOY.md. Do NOT touch COMPLETE marker.
        touch [STORY-ID]-COMPLETE
        rm -f PLAN-[STORY-ID].md RETRY-[STORY-ID].count
        Append to QUEUE-PROGRESS.md: "[ID]: COMPLETE at [timestamp]"
      INFRA stories (FIX-41-003, FIX-41-004):
        No git commit.
        touch [STORY-ID]-COMPLETE
        rm -f PLAN-[STORY-ID].md
        Append to QUEUE-PROGRESS.md: "[ID]: COMPLETE at [timestamp]"
      KB story (FIX-41-005):
        cd /Users/jamesilsley/GitHub/sparkmojo-internal
        git add platform/knowledge-base/
        git commit -m "feat(kb): add missing KB artifacts for BILL-011 through BILL-021 and WKBD-001"
        git push origin main
        cd /Users/jamesilsley/GitHub/spark-mojo-platform
        touch FIX-41-005-COMPLETE
        rm -f PLAN-FIX-41-005.md
        Append to QUEUE-PROGRESS.md: "FIX-41-005: COMPLETE at [timestamp]"
      ralph emit "story.committed" "[ID]: committed and complete."
