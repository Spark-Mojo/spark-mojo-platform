cli:
  backend: "claude"

event_loop:
  starting_event: "session.start"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 150
  max_runtime_seconds: 28800

core:
  guardrails:
    - "Absolute path to repo: /Users/jamesilsley/GitHub/spark-mojo-platform"
    - "Absolute path to frontend: /Users/jamesilsley/GitHub/spark-mojo-platform/frontend"
    - "Absolute path to governance repo: /Users/jamesilsley/GitHub/sparkmojo-internal"
    - "Package manager is pnpm. Never use npm or yarn."
    - "Language is JavaScript JSX. NOT TypeScript. If shadcn generates .tsx files, convert them to .jsx."
    - "DO NOT modify OnboardingMojo.jsx or WorkboardMojo.jsx. They are off-limits tonight."
    - "DO NOT modify frappe-client.js or any backend/abstraction-layer files."
    - "DO NOT delete or modify existing content in CLAUDE.md. Only APPEND new sections."
    - "DO NOT alter existing routes in pages/index.jsx. Only ADD the /library route alongside them."
    - "NO raw hex color values in new component files. All colors via var(--sm-*) tokens."
    - "All glass surfaces use token variables, never hardcoded rgba values."
    - "Visual north star: Ein UI (ui.eindev.ir) liquid glass aesthetic. Light mode is default."
    - "ADR spec: /Users/jamesilsley/GitHub/spark-mojo-platform/ADR-design-system.md"
    - "Component spec: /Users/jamesilsley/GitHub/spark-mojo-platform/COMPONENT_INVENTORY.md"
    - "Read CLAUDE.md FIRST every session: /Users/jamesilsley/GitHub/spark-mojo-platform/CLAUDE.md"

hats:
  health_check:
    name: "Health Check"
    description: "Verifies baseline health of the repo before any build work begins."
    triggers: ["session.start"]
    publishes: ["health.ok", "health.blocked"]
    max_activations: 1
    instructions: |
      Read /Users/jamesilsley/GitHub/spark-mojo-platform/CLAUDE.md first.
      Then run baseline checks in order. If any fail, write HEALTH-BLOCKED.md and emit health.blocked.

      1. cd /Users/jamesilsley/GitHub/spark-mojo-platform/frontend && pnpm run lint
         PASS: exits 0
      2. cd /Users/jamesilsley/GitHub/spark-mojo-platform/frontend && pnpm run build
         PASS: exits 0

      If lint fails due to legacy files in src/components/desktop/:
        Verify eslint.config.js ignores that directory. If not, add the ignore. Re-run lint.

      If all pass:
        ralph emit "health.ok" "lint clean, build ok"

  task_planner:
    name: "Task Planner"
    description: "Reads next uncompleted task from PROMPT.md and creates a build plan."
    triggers: ["health.ok", "task.committed"]
    publishes: ["plan.ready", "queue.complete"]
    instructions: |
      Read /Users/jamesilsley/GitHub/spark-mojo-platform/PROMPT.md.
      Find the first TASK-NN without a TASK-NN-COMPLETE marker file at repo root.

      If all tasks are done (TASK-01-COMPLETE through TASK-06-COMPLETE all exist):
        print LOOP_COMPLETE
        ralph emit "queue.complete" "All 6 tasks complete"
        Stop.

      Read the full task spec from PROMPT.md.
      Read /Users/jamesilsley/GitHub/spark-mojo-platform/ADR-design-system.md for architecture context.
      Read /Users/jamesilsley/GitHub/spark-mojo-platform/COMPONENT_INVENTORY.md for component specs.
      Read /Users/jamesilsley/GitHub/spark-mojo-platform/CLAUDE.md for conventions.

      Write PLAN-TASK-NN.md at repo root with:
        - Task number and name
        - Files to create or modify (with absolute paths)
        - Dependencies (which previous tasks must be done)
        - Specific gate commands for this task

      If anything is ambiguous:
        Write BLOCKED.md with the specific question.
        ralph emit "plan.ready" "TASK-NN: blocked on ambiguity, see BLOCKED.md"

      ralph emit "plan.ready" "TASK-NN: [summary], [N] files"

  builder:
    name: "Builder"
    description: "Implements the current task plan. Runs fast gates after each change."
    triggers: ["plan.ready", "build.retry"]
    publishes: ["build.ready", "build.blocked"]
    instructions: |
      Read PLAN-TASK-NN.md from /Users/jamesilsley/GitHub/spark-mojo-platform/ root.
      If BLOCKED.md exists for this task, skip to next task — emit build.blocked.

      Build exactly what the plan says. Nothing more. Nothing less.

      Key rules during build:
      - shadcn/ui may generate TypeScript (.tsx). Convert ALL to JavaScript (.jsx) — remove type annotations, rename files.
      - Every surface component must use var(--sm-glass-bg), var(--sm-glass-border), backdrop-filter: blur(var(--sm-glass-blur-*)).
      - Light mode is the DEFAULT. Glass surfaces are frosted white (bg-white/70) on light canvas. NOT dark glass.
      - No raw hex values. Use var(--sm-*) tokens only.
      - Import base components from ../ui/ — never recreate primitives.
      - Library page must be gated: only render when import.meta.env.DEV === true.
      - DO NOT modify existing content in CLAUDE.md — only APPEND.
      - DO NOT alter existing routes in pages/index.jsx — only ADD the library route.
      - Preserve existing AssignmentField.jsx in components/ui/ (move to mojo-patterns, update imports).

      Run fast gate after each significant file creation:
        cd /Users/jamesilsley/GitHub/spark-mojo-platform/frontend && pnpm run lint

      When the task implementation is complete and fast gates pass:
        ralph emit "build.ready" "TASK-NN: complete, lint passes"

  verifier:
    name: "Verifier"
    description: "Runs full gate suite for the current task. Only hat that can mark tasks done."
    triggers: ["build.ready"]
    publishes: ["task.done", "build.retry"]
    instructions: |
      Run ALL gates for the current task:

      1. cd /Users/jamesilsley/GitHub/spark-mojo-platform/frontend && pnpm run lint
         PASS: exits 0

      2. cd /Users/jamesilsley/GitHub/spark-mojo-platform/frontend && pnpm run build
         PASS: exits 0

      3. For TASK-03 and later: check for raw hex values in new component files
         grep -rn '#[0-9a-fA-F]\{3,8\}' /Users/jamesilsley/GitHub/spark-mojo-platform/frontend/src/components/mojo-patterns/ --include='*.jsx' --include='*.js' | grep -v '//' | grep -v 'comment'
         PASS: returns empty (no raw hex outside comments)

      4. For TASK-05: verify library route exists and imports all mojo-pattern components
         grep -l 'MojoHeader\|StatsCardRow\|FilterTabBar\|StatusBadge\|KanbanBoard\|DataTable\|TaskDetailDrawer\|AssignmentField' /Users/jamesilsley/GitHub/spark-mojo-platform/frontend/src/pages/Library.jsx
         PASS: file exists and matches

      5. For TASK-05: verify existing routes are intact
         grep 'OnboardingMojo\|WorkboardMojo' /Users/jamesilsley/GitHub/spark-mojo-platform/frontend/src/pages/index.jsx
         PASS: both still present

      6. For TASK-06 (final): run ALL above gates plus:
         - Verify tokens.css exists with all token categories
         - Verify all 8 pattern files exist in mojo-patterns/
         - Verify CLAUDE.md was APPENDED to (not truncated) — file should be LARGER than 23KB

      If ALL pass:
        touch /Users/jamesilsley/GitHub/spark-mojo-platform/TASK-NN-COMPLETE
        ralph emit "task.done" "TASK-NN: [gate results summary]"

      If ANY fail:
        ralph emit "build.retry" "TASK-NN: [exact failure — command, error output, file, line number]"

  committer:
    name: "Committer"
    description: "Commits verified work after each task passes all gates."
    triggers: ["task.done"]
    publishes: ["task.committed"]
    instructions: |
      cd /Users/jamesilsley/GitHub/spark-mojo-platform

      Stage all changes:
        git add -A

      Commit with task-specific message:
        TASK-01: git commit -m "feat: add design token system (tokens.css)"
        TASK-02: git commit -m "feat: install and initialize shadcn/ui component library"
        TASK-03: git commit -m "feat: theme all shadcn/ui components with Spark Mojo glass tokens"
        TASK-04: git commit -m "feat: build mojo-pattern composite components"
        TASK-05: git commit -m "feat: add /library component demo page (dev-only)"
        TASK-06: git commit -m "chore: update CLAUDE.md + final verification — design system foundation complete"

      ralph emit "task.committed" "TASK-NN committed on feature/design-system-foundation"