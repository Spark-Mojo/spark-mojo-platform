cli:
  backend: "claude"

event_loop:
  starting_event: "session.start"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 80
  max_runtime_seconds: 18000

core:
  guardrails:
    - "All work on branch queue/session-19-prov-001. Never commit to main."
    - "Do NOT run deploy.sh, bench commands, or SSH to the VPS."
    - "Do NOT modify CLAUDE.md, hats.yml, PROMPT.md, or any governance doc."
    - "If any story spec step is ambiguous, write BLOCKED-PROV-001.md and continue."
    - "Follow the pattern in abstraction-layer/routes/onboarding.py exactly."
    - "All secrets from env vars. Never hardcode credentials."
    - "Platform repo: /Users/jamesilsley/GitHub/spark-mojo-platform/"
    - "Governance repo: /Users/jamesilsley/GitHub/sparkmojo-internal/"

hats:
  context_reader:
    name: "Context Reader"
    description: "Reads all context files listed in PROMPT.md before any build work begins."
    triggers: ["session.start"]
    publishes: ["context.loaded"]
    max_activations: 1
    instructions: |
      Read every file listed in PROMPT.md under Context Files in order.
      Confirm in a brief summary what you found in each.
      Then: ralph emit "context.loaded" "All context files read"

  builder:
    name: "PROV-001 Builder"
    description: "Builds the provisioning API per the PROV-001 story spec."
    triggers: ["context.loaded"]
    publishes: ["build.complete"]
    max_activations: 1
    instructions: |
      Build PROV-001 per the story spec.

      == BRANCH SETUP ==
      cd /Users/jamesilsley/GitHub/spark-mojo-platform
      git checkout main && git pull origin main
      git checkout -b queue/session-19-prov-001

      == BUILD ORDER ==
      1. Create abstraction-layer/routes/provisioning.py
         - SiteCreateRequest and SiteCreateResponse Pydantic models
         - POST /api/admin/sites/create with all 14 steps
         - GET /api/admin/sites
         - GET /api/admin/sites/{site_subdomain}
         - GET /api/admin/benches
         - Follow onboarding.py pattern exactly
         - All secrets from env vars

      2. Register router in abstraction-layer/main.py

      3. Create SM Bench Registry DocType
         Path: frappe-apps/sm_provisioning/sm_provisioning/doctype/sm_bench_registry/
         JSON definition + Python controller + seed record for hipaa-health-01

      4. Extend SM Site Registry DocType
         Add new fields from story spec. Do NOT remove existing fields.

      5. Update vertical template YAMLs in sparkmojo-internal:
         platform/provisioning/templates/behavioral_health.yaml — add bench_tier: hipaa-health
         platform/provisioning/templates/general_smb.yaml — add bench_tier: standard-smb

      6. Update .env.example with new env vars

      == VERIFICATION ==
      - python3 -m py_compile abstraction-layer/routes/provisioning.py
      - Confirm main.py includes provisioning router
      - Confirm SM Bench Registry JSON is valid JSON
      - grep for hardcoded credentials in provisioning.py (must find none)

      == COMMIT ==
      cd /Users/jamesilsley/GitHub/spark-mojo-platform
      git add -A
      git commit -m "feat: provisioning API — POST /api/admin/sites/create, SM Bench Registry DocType, SM Site Registry schema extensions"
      git push origin queue/session-19-prov-001

      Then: ralph emit "build.complete" "PROV-001 committed to queue/session-19-prov-001"

  test_plan_writer:
    name: "Morning Test Plan Writer"
    description: "Writes MORNING-TEST-PLAN.md for James to verify the build."
    triggers: ["build.complete"]
    publishes: []
    max_activations: 1
    instructions: |
      Write /Users/jamesilsley/GitHub/spark-mojo-platform/MORNING-TEST-PLAN.md

      Include:
      1. Branch to check out: queue/session-19-prov-001
      2. ENV VAR CHECKLIST — which vars must be set in .env before testing
      3. Exact curl commands from PROV-001 story spec Test Steps
      4. Expected output for each command
      5. What to check on VPS after successful provisioning call
      6. What BLOCKED-* files to look for if something went wrong
      7. How to clean up test site after verification (bench drop-site command)

      Commit:
      git add MORNING-TEST-PLAN.md
      git commit -m "docs: MORNING-TEST-PLAN.md for PROV-001 verification"
      git push origin queue/session-19-prov-001

      Print run summary then output LOOP_COMPLETE.
