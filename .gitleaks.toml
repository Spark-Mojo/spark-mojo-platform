[extend]
useDefault = true

[allowlist]
# .tmp.driveupload/ contains Google Drive sync artifacts with example JWTs from documentation
# factory/bakeoff/ contains model evaluation results with sample code snippets
paths = [
  '''\.tmp\.driveupload/''',
  '''factory/bakeoff/''',
]
description = "Drive upload artifacts and bakeoff docs contain example tokens, not real secrets"
