# POC public deployment: React frontend + Mojo Abstraction Layer
# Both routed via Traefik on root_web network
# Run: docker compose -f docker-compose.poc.yml up -d --build

networks:
  root_web:
    external: true
    name: root_web
  frappe_network:
    external: true
    name: frappe-poc_frappe_network

services:
  # ── React Frontend ──────────────────────────────────────────
  poc-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    networks:
      - root_web
    labels:
      - "traefik.enable=true"
      # Explicit host rules for each app subdomain — required for ACME cert issuance
      # (HostRegexp rules do not trigger ACME cert requests)
      - "traefik.http.routers.app-poc-dev.rule=Host(`poc-dev.app.sparkmojo.com`)"
      - "traefik.http.routers.app-poc-dev.entrypoints=websecure"
      - "traefik.http.routers.app-poc-dev.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.app-poc-dev.service=app-frontend"
      - "traefik.http.routers.app-internal.rule=Host(`internal.app.sparkmojo.com`)"
      - "traefik.http.routers.app-internal.entrypoints=websecure"
      - "traefik.http.routers.app-internal.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.app-internal.service=app-frontend"
      - "traefik.http.routers.app-willow.rule=Host(`willow.app.sparkmojo.com`)"
      - "traefik.http.routers.app-willow.entrypoints=websecure"
      - "traefik.http.routers.app-willow.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.app-willow.service=app-frontend"
      - "traefik.http.routers.app-admin.rule=Host(`admin.app.sparkmojo.com`)"
      - "traefik.http.routers.app-admin.entrypoints=websecure"
      - "traefik.http.routers.app-admin.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.app-admin.service=app-frontend"
      # Legacy: preserve existing app.poc.sparkmojo.com
      - "traefik.http.routers.app-poc-legacy.rule=Host(`app.poc.sparkmojo.com`)"
      - "traefik.http.routers.app-poc-legacy.entrypoints=websecure"
      - "traefik.http.routers.app-poc-legacy.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.app-poc-legacy.service=app-frontend"
      - "traefik.http.services.app-frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=root_web"
    restart: unless-stopped

  # ── Mojo Abstraction Layer ───────────────────────────────────
  poc-api:
    build:
      context: ./abstraction-layer
      dockerfile: Dockerfile
    networks:
      - root_web
      - frappe_network
    env_file:
      - .env.poc
    labels:
      - "traefik.enable=true"
      # Health endpoint — all hosts
      - "traefik.http.routers.api-health.rule=PathPrefix(`/health`)"
      - "traefik.http.routers.api-health.entrypoints=websecure"
      - "traefik.http.routers.api-health.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.api-health.priority=100"
      - "traefik.http.routers.api-health.service=api-backend"
      # Modules router — all app subdomains + legacy
      - "traefik.http.routers.api-modules.rule=(Host(`poc.sparkmojo.com`) || Host(`poc-dev.app.sparkmojo.com`) || Host(`internal.app.sparkmojo.com`) || Host(`willow.app.sparkmojo.com`) || Host(`admin.app.sparkmojo.com`) || Host(`app.poc.sparkmojo.com`)) && PathPrefix(`/api/modules/`)"
      - "traefik.http.routers.api-modules.entrypoints=websecure"
      - "traefik.http.routers.api-modules.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.api-modules.priority=100"
      - "traefik.http.routers.api-modules.service=api-backend"
      # Legacy api subdomain
      - "traefik.http.routers.api-poc.rule=Host(`api.poc.sparkmojo.com`)"
      - "traefik.http.routers.api-poc.entrypoints=websecure"
      - "traefik.http.routers.api-poc.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.api-poc.service=api-backend"
      - "traefik.http.services.api-backend.loadbalancer.server.port=8001"
      - "traefik.docker.network=root_web"
    restart: unless-stopped

  # ── Medplum FHIR Server ─────────────────────────────────────
  medplum:
    image: medplum/medplum-server:latest
    networks:
      - frappe_network
    environment:
      - MEDPLUM_PORT=8103
      - MEDPLUM_BASE_URL=http://medplum:8103
      - MEDPLUM_DATABASE_HOST=medplum-postgres
      - MEDPLUM_DATABASE_PORT=5432
      - MEDPLUM_DATABASE_DBNAME=medplum
      - MEDPLUM_DATABASE_USERNAME=medplum
      - MEDPLUM_DATABASE_PASSWORD=${MEDPLUM_DB_PASSWORD}
      - MEDPLUM_REDIS_HOST=medplum-redis
      - MEDPLUM_REDIS_PORT=6379
      - MEDPLUM_REDIS_PASSWORD=${MEDPLUM_REDIS_PASSWORD}
      - MEDPLUM_MAX_JSON_SIZE=16mb
      - MEDPLUM_AUDIT_EVENT_LOG_ENABLED=true
      - MEDPLUM_AUDIT_EVENT_IN_DATABASE=true
    volumes:
      - ./medplum/medplum.config.json:/usr/src/medplum/medplum.config.json:ro
    depends_on:
      medplum-postgres:
        condition: service_healthy
      medplum-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8103/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ── Medplum PostgreSQL ───────────────────────────────────────
  medplum-postgres:
    image: postgres:16-alpine
    networks:
      - frappe_network
    environment:
      - POSTGRES_DB=medplum
      - POSTGRES_USER=medplum
      - POSTGRES_PASSWORD=${MEDPLUM_DB_PASSWORD}
    volumes:
      - medplum-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medplum -d medplum"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Medplum Redis ────────────────────────────────────────────
  medplum-redis:
    image: redis:7-alpine
    networks:
      - frappe_network
    command: redis-server --requirepass ${MEDPLUM_REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - medplum-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${MEDPLUM_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  medplum-postgres-data:
  medplum-redis-data:
