# POC public deployment: React frontend + Mojo Abstraction Layer
# Both routed via Traefik on root_web network
# Run: docker compose -f docker-compose.poc.yml up -d --build

networks:
  root_web:
    external: true
    name: root_web
  frappe_network:
    external: true
    name: frappe-poc_frappe_network

services:
  # ── React Frontend ──────────────────────────────────────────
  poc-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    networks:
      - root_web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-poc.rule=Host(`app.poc.sparkmojo.com`)"
      - "traefik.http.routers.app-poc.entrypoints=websecure"
      - "traefik.http.routers.app-poc.tls.certresolver=mytlschallenge"
      - "traefik.http.services.app-poc.loadbalancer.server.port=80"
      - "traefik.docker.network=root_web"
    restart: unless-stopped

  # ── Mojo Abstraction Layer ───────────────────────────────────
  poc-api:
    build:
      context: ./abstraction-layer
      dockerfile: Dockerfile
    networks:
      - root_web
      - frappe_network
    env_file:
      - .env.poc
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-poc.rule=Host(`api.poc.sparkmojo.com`)"
      - "traefik.http.routers.api-poc.entrypoints=websecure"
      - "traefik.http.routers.api-poc.tls.certresolver=mytlschallenge"
      - "traefik.http.services.api-poc.loadbalancer.server.port=8001"
      - "traefik.docker.network=root_web"
    restart: unless-stopped
