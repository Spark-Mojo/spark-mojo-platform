server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA - all routes served by index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
